name: IssueCTL
options:
  bundleIdPrefix: com.issuectl
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
targets:
  IssueCTL:
    type: application
    supportedDestinations: [iOS]
    sources:
      - path: IssueCTL
    info:
      path: IssueCTL/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLName: com.issuectl.ios.setup
            CFBundleURLSchemes:
              - issuectl
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        "UISupportedInterfaceOrientations~iphone":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: "IssueCTL connects to the issuectl server running on your Mac."
    settings:
      base:
        SWIFT_VERSION: "6.0"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.issuectl.ios
        DEVELOPMENT_TEAM: B3A6AN2HA4
        CODE_SIGN_STYLE: Automatic
    preBuildScripts:
      - name: Generate AppVersion.swift
        basedOnDependencyAnalysis: false
        script: |
          OUTPUT="${PROJECT_DIR}/IssueCTL/Generated/AppVersion.swift"
          mkdir -p "$(dirname "$OUTPUT")"
          GIT_VERSION=$(git -C "${PROJECT_DIR}/.." tag --sort=-v:refname -l "v*" 2>/dev/null | head -1 | sed 's/^v//')
          if [ -z "$GIT_VERSION" ]; then
            GIT_VERSION="0.0.0"
          fi
          GIT_SHA=$(git -C "${PROJECT_DIR}/.." rev-parse --short HEAD 2>/dev/null || echo "0")
          cat > "$OUTPUT" << SWIFT
          // Auto-generated by build script — do not edit
          enum AppVersion {
              static let version = "$GIT_VERSION"
              static let build = "$GIT_SHA"
              static let display = "$GIT_VERSION ($GIT_SHA)"
          }
          SWIFT
        outputFiles:
          - $(PROJECT_DIR)/IssueCTL/Generated/AppVersion.swift
    scheme:
      testTargets:
        - IssueCTLTests
      gatherCoverageData: true
  IssueCTLTests:
    type: bundle.unit-test
    supportedDestinations: [iOS]
    sources:
      - path: IssueCTLTests
    dependencies:
      - target: IssueCTL
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.issuectl.ios.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/IssueCTL.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/IssueCTL"
        BUNDLE_LOADER: "$(TEST_HOST)"

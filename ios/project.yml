name: IssueCTL
options:
  bundleIdPrefix: com.issuectl
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
targets:
  IssueCTL:
    type: application
    supportedDestinations: [iOS]
    sources:
      - path: IssueCTL
    info:
      path: IssueCTL/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLName: $(PRODUCT_BUNDLE_IDENTIFIER).setup
            CFBundleURLSchemes:
              - $(ISSUECTL_URL_SCHEME)
        CFBundleDisplayName: $(ISSUECTL_DISPLAY_NAME)
        ISSUECTL_APP_VARIANT: $(ISSUECTL_APP_VARIANT)
        ISSUECTL_KEYCHAIN_SERVICE: $(ISSUECTL_KEYCHAIN_SERVICE)
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        "UISupportedInterfaceOrientations~iphone":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: $(ISSUECTL_LOCAL_NETWORK_USAGE_DESCRIPTION)
    settings:
      base:
        SWIFT_VERSION: "6.0"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.issuectl.ios
        PRODUCT_NAME: IssueCTL
        ISSUECTL_DISPLAY_NAME: IssueCTL
        ISSUECTL_APP_VARIANT: production
        ISSUECTL_KEYCHAIN_SERVICE: com.issuectl.ios
        ISSUECTL_URL_SCHEME: issuectl
        ISSUECTL_LOCAL_NETWORK_USAGE_DESCRIPTION: IssueCTL connects to the issuectl server running on your Mac.
        CODE_SIGN_ENTITLEMENTS: IssueCTL/IssueCTL.entitlements
        APS_ENVIRONMENT: development
        DEVELOPMENT_TEAM: B3A6AN2HA4
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production
    preBuildScripts:
      - name: Generate AppVersion.swift
        basedOnDependencyAnalysis: false
        script: |
          OUTPUT="${PROJECT_DIR}/IssueCTL/Generated/AppVersion.swift"
          mkdir -p "$(dirname "$OUTPUT")"
          GIT_VERSION=$(git -C "${PROJECT_DIR}/.." tag --sort=-v:refname -l "v*" 2>/dev/null | head -1 | sed 's/^v//')
          if [ -z "$GIT_VERSION" ]; then
            GIT_VERSION="0.0.0"
          fi
          GIT_SHA=$(git -C "${PROJECT_DIR}/.." rev-parse --short HEAD 2>/dev/null || echo "0")
          cat > "$OUTPUT" << SWIFT
          // Auto-generated by build script — do not edit
          enum AppVersion {
              static let version = "$GIT_VERSION"
              static let build = "$GIT_SHA"
              static let display = "$GIT_VERSION ($GIT_SHA)"
          }
          SWIFT
        outputFiles:
          - $(PROJECT_DIR)/IssueCTL/Generated/AppVersion.swift
    scheme:
      testTargets:
        - IssueCTLTests
        - IssueCTLUITests
      gatherCoverageData: true
  IssueCTLPreview:
    type: application
    supportedDestinations: [iOS]
    sources:
      - path: IssueCTL
    info:
      path: IssueCTL/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLName: $(PRODUCT_BUNDLE_IDENTIFIER).setup
            CFBundleURLSchemes:
              - $(ISSUECTL_URL_SCHEME)
        CFBundleDisplayName: $(ISSUECTL_DISPLAY_NAME)
        ISSUECTL_APP_VARIANT: $(ISSUECTL_APP_VARIANT)
        ISSUECTL_KEYCHAIN_SERVICE: $(ISSUECTL_KEYCHAIN_SERVICE)
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        "UISupportedInterfaceOrientations~iphone":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: $(ISSUECTL_LOCAL_NETWORK_USAGE_DESCRIPTION)
    settings:
      base:
        SWIFT_VERSION: "6.0"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.issuectl.ios.preview
        PRODUCT_NAME: IssueCTLPreview
        ISSUECTL_DISPLAY_NAME: IssueCTL Preview
        ISSUECTL_APP_VARIANT: preview
        ISSUECTL_KEYCHAIN_SERVICE: com.issuectl.ios.preview
        ISSUECTL_URL_SCHEME: issuectl-preview
        ISSUECTL_LOCAL_NETWORK_USAGE_DESCRIPTION: IssueCTL Preview connects to the issuectl server running on your Mac.
        CODE_SIGN_ENTITLEMENTS: IssueCTL/IssueCTL.entitlements
        APS_ENVIRONMENT: development
        DEVELOPMENT_TEAM: B3A6AN2HA4
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production
    preBuildScripts:
      - name: Generate AppVersion.swift
        basedOnDependencyAnalysis: false
        script: |
          OUTPUT="${PROJECT_DIR}/IssueCTL/Generated/AppVersion.swift"
          mkdir -p "$(dirname "$OUTPUT")"
          GIT_VERSION=$(git -C "${PROJECT_DIR}/.." tag --sort=-v:refname -l "v*" 2>/dev/null | head -1 | sed 's/^v//')
          if [ -z "$GIT_VERSION" ]; then
            GIT_VERSION="0.0.0"
          fi
          GIT_SHA=$(git -C "${PROJECT_DIR}/.." rev-parse --short HEAD 2>/dev/null || echo "0")
          cat > "$OUTPUT" << SWIFT
          // Auto-generated by build script — do not edit
          enum AppVersion {
              static let version = "$GIT_VERSION"
              static let build = "$GIT_SHA"
              static let display = "$GIT_VERSION ($GIT_SHA)"
          }
          SWIFT
        outputFiles:
          - $(PROJECT_DIR)/IssueCTL/Generated/AppVersion.swift
    scheme:
      testTargets:
        - IssueCTLPreviewUITests
      gatherCoverageData: true
  IssueCTLTests:
    type: bundle.unit-test
    supportedDestinations: [iOS]
    sources:
      - path: IssueCTLTests
    dependencies:
      - target: IssueCTL
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.issuectl.ios.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/IssueCTL.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/IssueCTL"
        BUNDLE_LOADER: "$(TEST_HOST)"
  IssueCTLUITests:
    type: bundle.ui-testing
    supportedDestinations: [iOS]
    sources:
      - path: IssueCTLUITests
    dependencies:
      - target: IssueCTL
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.issuectl.ios.uitests
        TEST_TARGET_NAME: IssueCTL
        # Code signing required for UI tests on physical devices
        DEVELOPMENT_TEAM: B3A6AN2HA4
        CODE_SIGN_STYLE: Automatic
        BUNDLE_LOADER: ""  # UI tests run out-of-process; no bundle injection
  IssueCTLPreviewUITests:
    type: bundle.ui-testing
    supportedDestinations: [iOS]
    sources:
      - path: IssueCTLUITests
    dependencies:
      - target: IssueCTLPreview
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.issuectl.ios.preview.uitests
        TEST_TARGET_NAME: IssueCTLPreview
        DEVELOPMENT_TEAM: B3A6AN2HA4
        CODE_SIGN_STYLE: Automatic
        BUNDLE_LOADER: ""  # UI tests run out-of-process; no bundle injection
# Standalone schemes (supplement the per-target inline scheme above)
schemes:
  IssueCTL-Production:
    build:
      targets:
        IssueCTL: all
        IssueCTLTests: [testing]
        IssueCTLUITests: [testing]
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - IssueCTLTests
        - IssueCTLUITests
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
  IssueCTL-Preview:
    build:
      targets:
        IssueCTLPreview: all
        IssueCTLPreviewUITests: [testing]
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - IssueCTLPreviewUITests
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
  IssueCTL-UISmoke:
    build:
      targets:
        IssueCTL: all
        IssueCTLUITests: [testing]
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - IssueCTLUITests
    run:
      config: Debug
  IssueCTLPreview-UISmoke:
    build:
      targets:
        IssueCTLPreview: all
        IssueCTLPreviewUITests: [testing]
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - IssueCTLPreviewUITests
    run:
      config: Debug

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>issuectl - Workbench Mockup</title>
<style>
  :root {
    --paper-bg: #f3ecd9;
    --paper-bg-warm: #ede5cf;
    --paper-bg-warmer: #e6dec4;
    --paper-ink: #1a1712;
    --paper-ink-soft: #3a342a;
    --paper-ink-muted: #746a50;
    --paper-line: #e0d6bc;
    --paper-line-strong: #d2c5a6;
    --paper-accent: #2d5f3f;
    --paper-accent-dim: #4a7a5c;
    --paper-accent-soft: #dce8de;
    --paper-brick: #a8432a;
    --paper-brick-soft: #efd9d1;
    --paper-butter: #d9a54d;
    --terminal-bg: #171916;
    --terminal-chrome: #292821;
    --terminal-text: #dbe7d7;
    --terminal-muted: #82907e;
    --radius-sm: 3px;
    --radius-md: 6px;
    --radius-lg: 8px;
    --serif: Georgia, "Times New Roman", serif;
    --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--paper-bg);
    color: var(--paper-ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.16;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.26'/></svg>");
    background-size: 200px;
  }

  button {
    font: inherit;
    color: inherit;
    cursor: pointer;
  }

  button:disabled {
    cursor: default;
    opacity: 0.62;
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  .topbar {
    height: 54px;
    border-bottom: 1px solid var(--paper-line);
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 0 18px;
    background: rgba(243, 236, 217, 0.92);
    backdrop-filter: blur(14px);
  }

  .brand {
    font-family: var(--serif);
    font-style: italic;
    font-size: 28px;
    line-height: 1;
    white-space: nowrap;
  }

  .brand-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--paper-accent);
    margin-left: 2px;
    vertical-align: 5px;
  }

  .route {
    font: 12px var(--mono);
    color: var(--paper-ink-muted);
    padding: 5px 8px;
    border: 1px solid var(--paper-line);
    border-radius: var(--radius-sm);
    background: rgba(255, 255, 255, 0.22);
  }

  .topnav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-left: auto;
    font-family: var(--serif);
    font-style: italic;
    font-size: 13px;
    color: var(--paper-ink-muted);
  }

  .topnav a,
  .topnav span,
  .topnav button {
    text-decoration: none;
    color: inherit;
  }

  .topnav button {
    border: 0;
    background: transparent;
    padding: 0;
    font: inherit;
    font-style: inherit;
  }

  .topnav .active {
    color: var(--paper-accent);
  }

  .workbench {
    min-height: 0;
    display: grid;
    grid-template-columns: 76px var(--instances-width, 284px) 6px minmax(440px, 1fr) 6px var(--issues-width, 348px);
    position: relative;
  }

  body[data-mode="issueBoard"] .workbench {
    grid-template-columns: 76px minmax(0, 1fr);
  }

  body[data-mode="globalIssues"] .workbench,
  body[data-mode="settings"] .workbench {
    grid-template-columns: 76px minmax(0, 1fr);
  }

  body[data-mode="issueBoard"] .instance-pane,
  body[data-mode="issueBoard"] .issue-pane,
  body[data-mode="issueBoard"] .resize-handle,
  body[data-mode="globalIssues"] .instance-pane,
  body[data-mode="globalIssues"] .issue-pane,
  body[data-mode="globalIssues"] .resize-handle,
  body[data-mode="settings"] .instance-pane,
  body[data-mode="settings"] .issue-pane,
  body[data-mode="settings"] .resize-handle {
    display: none;
  }

  .resize-handle {
    min-width: 6px;
    background: linear-gradient(to right, transparent, rgba(45, 95, 63, 0.18), transparent);
    cursor: col-resize;
  }

  .resize-handle:hover,
  .resize-handle.dragging {
    background: var(--paper-accent-soft);
  }

  .pane {
    min-width: 0;
    min-height: 0;
    border-right: 1px solid var(--paper-line);
    overflow: hidden;
  }

  .pane:last-child { border-right: 0; }

  .repo-rail {
    background: var(--paper-bg-warm);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 12px 8px;
  }

  .repo-button,
  .rail-button {
    width: 44px;
    height: 44px;
    border: 1px solid var(--paper-line-strong);
    border-radius: var(--radius-lg);
    background: rgba(255, 255, 255, 0.25);
    display: grid;
    place-items: center;
    color: var(--paper-ink-muted);
    font: 700 11px var(--mono);
    position: relative;
  }

  .repo-button.active {
    background: var(--paper-ink);
    color: var(--paper-bg);
    border-color: var(--paper-ink);
  }

  .repo-button .badge {
    position: absolute;
    top: -5px;
    right: -5px;
    min-width: 17px;
    height: 17px;
    padding: 0 4px;
    display: grid;
    place-items: center;
    border-radius: 999px;
    background: var(--paper-accent);
    color: #fff;
    font-size: 9px;
  }

  .rail-spacer { flex: 1; }

  .instance-pane,
  .issue-pane {
    display: flex;
    flex-direction: column;
    background: #f6efd9;
  }

  .pane-head {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--paper-line);
  }

  .kicker {
    margin-bottom: 5px;
    color: var(--paper-ink-muted);
    font: 700 10px var(--mono);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .title-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    min-width: 0;
  }

  .pane-title {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: var(--serif);
    font-style: italic;
    font-size: 22px;
    line-height: 1.1;
  }

  .count {
    color: var(--paper-ink-muted);
    font: 600 11px var(--mono);
    white-space: nowrap;
  }

  .search {
    height: 34px;
    margin-top: 12px;
    border: 1px solid var(--paper-line-strong);
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    padding: 0 10px;
    color: var(--paper-ink-muted);
    font-size: 12px;
    background: rgba(255, 255, 255, 0.24);
  }

  .sort-row {
    display: flex;
    gap: 6px;
    margin-top: 12px;
  }

  .sort-button {
    height: 26px;
    padding: 0 9px;
    border: 1px solid var(--paper-line-strong);
    border-radius: 999px;
    background: transparent;
    color: var(--paper-ink-muted);
    font-size: 11px;
  }

  .sort-button.active {
    background: var(--paper-accent-soft);
    color: var(--paper-accent);
    border-color: #bfd1c2;
  }

  .scroll {
    flex: 1;
    min-height: 0;
    overflow: auto;
    padding: 10px;
  }

  .section-label {
    padding: 8px 6px 6px;
    color: var(--paper-ink-muted);
    font: 700 10px var(--mono);
    letter-spacing: .07em;
    text-transform: uppercase;
  }

  .disclosure {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    border: 0;
    background: transparent;
    padding: 9px 6px 6px;
    color: var(--paper-ink-muted);
    font: 700 10px var(--mono);
    letter-spacing: .07em;
    text-transform: uppercase;
  }

  .disclosure span:last-child {
    font-weight: 500;
    letter-spacing: 0;
    text-transform: none;
  }

  .instance,
  .issue-card {
    border: 1px solid transparent;
    border-radius: var(--radius-lg);
    padding: 10px;
    margin-bottom: 7px;
    width: 100%;
    display: block;
    text-align: left;
  }

  .instance {
    background: transparent;
  }

  .instance.active {
    border-color: #bfd1c2;
    background: var(--paper-accent-soft);
    box-shadow: inset 3px 0 0 var(--paper-accent);
  }

  .instance.manual {
    background: rgba(255, 255, 255, 0.24);
    border-color: var(--paper-line);
  }

  .item-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }

  .status {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--paper-accent);
    flex: 0 0 auto;
  }

  .status.idle { background: var(--paper-butter); }
  .status.shell { background: var(--paper-ink-muted); }
  .status.error { background: var(--paper-brick); }
  .status.unavailable { background: transparent; border: 1px solid var(--paper-ink-muted); }

  .item-name {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 13px;
    font-weight: 650;
  }

  .meta {
    color: var(--paper-ink-muted);
    font: 11px var(--mono);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .session-preview {
    margin-top: 8px;
    padding: 7px;
    border-radius: var(--radius-md);
    background: rgba(26, 23, 18, 0.06);
    color: var(--paper-ink-muted);
    font: 10px/1.35 var(--mono);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .session-preview.error {
    color: var(--paper-brick);
    background: var(--paper-brick-soft);
  }

  .session-preview.unavailable {
    background: rgba(26, 23, 18, 0.03);
  }

  .instance-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }

  .tiny-action {
    height: 22px;
    padding: 0 7px;
    border: 1px solid var(--paper-line-strong);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--paper-ink-muted);
    font-size: 10px;
  }

  .new-shell {
    margin: 10px;
    height: 36px;
    border: 1px solid var(--paper-accent);
    border-radius: var(--radius-md);
    background: var(--paper-accent);
    color: #fff;
    font-size: 13px;
    font-weight: 650;
  }

  .focus-pane {
    display: flex;
    flex-direction: column;
    background: var(--paper-bg);
  }

  .focus-head {
    min-height: 76px;
    border-bottom: 1px solid var(--paper-line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    padding: 14px 18px;
  }

  .focus-title {
    min-width: 0;
  }

  .focus-title h1 {
    margin: 0 0 5px;
    font-size: 18px;
    line-height: 1.2;
  }

  .focus-title p {
    margin: 0;
    color: var(--paper-ink-muted);
    font: 12px var(--mono);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .actions {
    display: flex;
    gap: 8px;
    flex: 0 0 auto;
  }

  .action {
    height: 32px;
    border: 1px solid var(--paper-line-strong);
    border-radius: var(--radius-md);
    background: transparent;
    color: var(--paper-ink-soft);
    padding: 0 11px;
    font-size: 12px;
  }

  .action.primary {
    background: var(--paper-accent);
    color: #fff;
    border-color: var(--paper-accent);
  }

  .action.danger {
    color: var(--paper-brick);
    border-color: #d8b9ad;
  }

  .toast {
    position: fixed;
    right: 18px;
    bottom: 18px;
    z-index: 10;
    border: 1px solid var(--paper-line-strong);
    border-radius: var(--radius-lg);
    background: rgba(26, 23, 18, 0.9);
    color: var(--paper-bg);
    padding: 10px 12px;
    font-size: 12px;
    box-shadow: 0 10px 30px rgba(26, 23, 18, 0.28);
  }

  .focus-body {
    flex: 1;
    min-height: 0;
    padding: 14px 18px 18px;
    overflow: auto;
  }

  .terminal-frame {
    height: 100%;
    min-height: 440px;
    display: flex;
    flex-direction: column;
  }

  .terminal-tabs {
    height: 36px;
    border: 1px solid #1f211f;
    border-bottom: 0;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    background: var(--terminal-chrome);
    color: #e9dfc6;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 10px;
    font-size: 12px;
  }

  .term-dot {
    width: 9px;
    height: 9px;
    border-radius: 999px;
    background: var(--paper-ink-muted);
  }

  .terminal {
    flex: 1;
    min-height: 0;
    border: 1px solid #1f211f;
    border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    background: var(--terminal-bg);
    color: var(--terminal-text);
    padding: 16px;
    overflow: hidden;
    font: 12px/1.55 var(--mono);
  }

  .terminal .muted { color: var(--terminal-muted); }
  .terminal .prompt { color: #8fca95; }
  .terminal .warn { color: var(--paper-butter); }
  .cursor {
    display: inline-block;
    width: 7px;
    height: 14px;
    background: var(--terminal-text);
    vertical-align: -2px;
  }

  .issue-detail {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 240px;
    gap: 14px;
  }

  .detail-card {
    border: 1px solid var(--paper-line);
    border-radius: var(--radius-lg);
    background: rgba(255, 255, 255, 0.22);
    padding: 14px;
  }

  .detail-card.collapsible {
    padding: 0;
    overflow: hidden;
  }

  .detail-card.collapsible .card-body {
    padding: 0 14px 14px;
  }

  .detail-card.collapsible .disclosure {
    padding: 12px 14px;
    color: var(--paper-ink);
    font-size: 12px;
    letter-spacing: 0;
    text-transform: none;
  }

  .detail-card h2 {
    margin: 0 0 10px;
    font-size: 14px;
  }

  .detail-card h3 {
    margin: 14px 0 8px;
    font-size: 12px;
  }

  .body-copy {
    color: var(--paper-ink-soft);
    font-size: 13px;
    line-height: 1.55;
  }

  .body-copy p { margin: 0 0 10px; }

  .chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }

  .detail-chip {
    border: 1px solid var(--paper-line-strong);
    border-radius: 999px;
    padding: 4px 8px;
    background: rgba(255, 255, 255, 0.18);
    color: var(--paper-ink-muted);
    font: 11px var(--mono);
  }

  .detail-chip.green {
    background: var(--paper-accent-soft);
    border-color: #bfd1c2;
    color: var(--paper-accent);
  }

  .comment-box {
    min-height: 74px;
    margin-top: 8px;
    border: 1px solid var(--paper-line-strong);
    border-radius: var(--radius-md);
    padding: 9px;
    background: rgba(255, 255, 255, 0.2);
    color: var(--paper-ink-muted);
    font-size: 12px;
  }

  .side-actions {
    display: grid;
    gap: 7px;
    margin-top: 10px;
  }

  .side-actions .action,
  .side-actions .new-shell {
    width: 100%;
    margin: 0;
  }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .launch-box {
    position: sticky;
    top: 0;
  }

  .field {
    margin-bottom: 12px;
  }

  .field label {
    display: block;
    margin-bottom: 5px;
    color: var(--paper-ink-muted);
    font: 700 10px var(--mono);
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .input-like {
    min-height: 32px;
    border: 1px solid var(--paper-line-strong);
    border-radius: var(--radius-md);
    padding: 8px;
    color: var(--paper-ink-soft);
    font-size: 12px;
    background: rgba(255, 255, 255, 0.2);
  }

  .input-like.warn {
    border-color: #ddbd75;
    background: rgba(217, 165, 77, 0.14);
  }

  .input-like.error {
    border-color: #d8a393;
    background: var(--paper-brick-soft);
    color: var(--paper-brick);
  }

  .filter-row {
    display: flex;
    gap: 6px;
    margin-top: 12px;
  }

  .filter {
    height: 26px;
    padding: 0 9px;
    border-radius: 999px;
    border: 1px solid var(--paper-line-strong);
    color: var(--paper-ink-muted);
    display: grid;
    place-items: center;
    font-size: 11px;
  }

  .filter.active {
    background: var(--paper-accent-soft);
    color: var(--paper-accent);
    border-color: #bfd1c2;
  }

  .issue-card {
    background: rgba(255, 255, 255, 0.25);
    border-color: var(--paper-line);
  }

  button.issue-card {
    font: inherit;
    color: inherit;
  }

  .issue-card.running {
    border-color: #bfd1c2;
    background: #edf5ec;
  }

  .issue-card.selected {
    border-color: #d5a284;
    background: #f5e5dc;
    box-shadow: inset 3px 0 0 var(--paper-brick);
  }

  .issue-title {
    margin-bottom: 7px;
    font-size: 13px;
    font-weight: 650;
    line-height: 1.28;
  }

  .issue-meta {
    display: flex;
    align-items: center;
    gap: 7px;
    flex-wrap: wrap;
    color: var(--paper-ink-muted);
    font: 11px var(--mono);
  }

  .pill {
    border-radius: 999px;
    background: var(--paper-bg-warm);
    padding: 2px 7px;
  }

  .pill.green {
    background: var(--paper-accent-soft);
    color: var(--paper-accent);
  }

  .pill.brick {
    background: var(--paper-brick-soft);
    color: var(--paper-brick);
  }

  .issue-actions {
    margin-top: 9px;
    display: flex;
    gap: 6px;
  }

  .mini-action {
    height: 25px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--paper-line-strong);
    background: transparent;
    padding: 0 8px;
    color: var(--paper-ink-soft);
    font-size: 11px;
  }

  .mini-action.primary {
    background: var(--paper-accent);
    border-color: var(--paper-accent);
    color: #fff;
  }

  .mode { display: none; }
  body[data-mode="terminal"] .mode-terminal { display: block; }
  body[data-mode="issue"] .mode-issue { display: block; }
  body[data-mode="repo"] .mode-repo { display: block; }
  body[data-mode="shell"] .mode-shell { display: block; }
  body[data-mode="repoSetup"] .mode-repo-setup { display: block; }
  body[data-mode="quickCreate"] .mode-quick-create { display: block; }
  body[data-mode="settings"] .mode-settings { display: block; }
  body[data-mode="globalIssues"] .mode-global-issues { display: block; }
  body[data-mode="issueBoard"] .mode-issue-board { display: block; }
  body[data-mode="pullRequests"] .mode-pull-requests { display: block; }
  body[data-mode="terminal"] .issue-selectable { }
  body[data-mode="issue"] .terminal-selected { }

  body[data-mode="terminal"] .issue-selected-only { display: none; }
  body[data-mode="issue"] .terminal-selected-only { display: none; }
  body[data-mode="issue"] .issue-selected-only { display: block; }
  body[data-mode="issue"] .issue-card.issue-selectable:not(.issue-selected-only) {
    display: none;
  }
  body[data-mode="repo"] .instance.active,
  body[data-mode="repoSetup"] .instance.active,
  body[data-mode="quickCreate"] .instance.active,
  body[data-mode="settings"] .instance.active,
  body[data-mode="globalIssues"] .instance.active,
  body[data-mode="issueBoard"] .instance.active,
  body[data-mode="pullRequests"] .instance.active,
  body[data-mode="shell"] .instance.active {
    border-color: transparent;
    background: transparent;
    box-shadow: none;
  }

  body[data-mode="issue"] .instance.active {
    border-color: transparent;
    background: transparent;
    box-shadow: none;
  }

  body[data-mode="issue"] .instance.active:hover {
    background: rgba(255, 255, 255, 0.18);
  }

  .shell-form-layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 280px;
    gap: 14px;
  }

  .repo-board {
    min-height: 100%;
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: minmax(240px, 1fr);
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 8px;
  }

  .repo-board-column {
    border: 1px solid var(--paper-line);
    border-radius: var(--radius-lg);
    background: rgba(255, 255, 255, 0.18);
    min-width: 240px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .repo-board-head {
    padding: 12px;
    border-bottom: 1px solid var(--paper-line);
    background: rgba(237, 229, 207, 0.55);
  }

  const state = {
    repoId: "issuectl",
    mode: "terminal",
    selectedInstanceId: "ic-447",
    selectedIssueNumber: null,
    shellDraftCounter: 1,
    instanceSort: "status",
    boardSort: "repo",
    boardRunningOnly: false,
    collapsed: {
      issueSessions: false,
      namedShells: false,
      issueBody: false,
      launchPrep: false,
      repoSettings: false,
    },
  };

  function currentRepo() {
    return repos.find((repo) => repo.id === state.repoId) ?? repos[0];
  }

  function activeIssueNumbers(repo) {
    return new Set(repo.instances.filter((instance) => instance.type === "issue").map((instance) => instance.issueNumber));
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");
  }

  function render() {
    const repo = currentRepo();
    document.body.dataset.mode = state.mode;
    document.getElementById("routeLabel").textContent = routeForMode();
    renderRepoRail();
    renderInstances(repo);
    renderIssues(repo);
    renderFocus(repo);
    renderModeButtons();
  }

  function renderRepoRail() {
    const rail = document.getElementById("repoRail");
    rail.innerHTML = repos.map((repo) => {
      const live = repo.instances.length;
      return `
        <button class="repo-button ${repo.id === state.repoId ? "active" : ""}" title="${repo.owner}/${repo.name}" onclick="selectRepo('${repo.id}')">
          ${repo.initials}${live ? `<span class="badge">${live}</span>` : ""}
        </button>
      `;
    }).join("") + `
      <div class="rail-spacer"></div>
      <button class="rail-button" title="Add repository" onclick="openRepoSetup()">+</button>
      <button class="rail-button" title="Repo settings" onclick="openRepoSetup()">...</button>
    `;
  }

  function renderInstances(repo) {
    document.getElementById("instanceRepoTitle").textContent = repo.name;
    document.getElementById("instanceCount").textContent = `${repo.instances.length} live`;
    const sortedInstances = sortInstances(repo.instances);
    const issueSessions = sortedInstances.filter((instance) => instance.type === "issue");
    const shells = sortedInstances.filter((instance) => instance.type === "shell");
    document.getElementById("instanceList").innerHTML = `
      ${renderDisclosure("issueSessions", `Issue sessions`, `${issueSessions.length}`)}
      ${state.collapsed.issueSessions ? "" : issueSessions.length ? issueSessions.map(renderInstance).join("") : `<div class="meta" style="padding:8px 6px 14px">No issue sessions</div>`}
      ${renderDisclosure("namedShells", `Named shells`, `${shells.length}`)}
      ${state.collapsed.namedShells ? "" : shells.length ? shells.map(renderInstance).join("") : `<div class="meta" style="padding:8px 6px 14px">No named shells</div>`}
    `;
  }

  function renderInstance(instance) {
    const isActive = state.mode === "terminal" && state.selectedInstanceId === instance.id;
    const statusClass = instance.status === "idle"
      ? "idle"
      : instance.status === "error"
        ? "error"
        : instance.status === "unavailable"
          ? "unavailable"
          : instance.type === "shell" ? "shell" : "";
    const meta = instance.type === "issue"
      ? `${instance.agent} - ${instance.branch} - ${instance.duration}`
      : `Shell - ${instance.duration}`;
    const previewLabel = instance.previewStatus === "idle"
      ? "idle preview"
      : instance.previewStatus === "error"
        ? "preview error"
        : instance.previewStatus === "unavailable"
          ? "preview unavailable"
          : "latest";
    return `
      <button class="instance ${instance.type === "shell" ? "manual" : ""} ${isActive ? "active" : ""}" type="button" onclick="selectInstance('${instance.id}')">
        <div class="item-top">
          <span class="status ${statusClass}"></span>
          <span class="item-name">${escapeHtml(instance.name)}</span>
        </div>
        <div class="meta">${escapeHtml(meta)}</div>
        <div class="session-preview ${escapeHtml(instance.previewStatus ?? "")}">${previewLabel}: ${escapeHtml(instance.preview ?? "preview unavailable")}</div>
        <div class="instance-actions">
          <span class="tiny-action">Reconnect</span>
          <span class="tiny-action">End</span>
        </div>
      </button>
    `;
  }

  function statusRank(instance) {
    if (instance.status === "active") return 0;
    if (instance.status === "idle") return 1;
    if (instance.status === "error") return 2;
    if (instance.status === "unavailable") return 3;
    if (instance.type === "shell") return 4;
    return 5;
  }

  function sortInstances(instances) {
    return [...instances].sort((a, b) => {
      if (state.instanceSort === "status") return statusRank(a) - statusRank(b);
      if (state.instanceSort === "kind") return a.type.localeCompare(b.type) || statusRank(a) - statusRank(b);
      return 0;
    });
  }

  function renderDisclosure(key, label, count) {
    const collapsed = state.collapsed[key];
    return `
      <button class="disclosure" onclick="toggleCollapse('${key}')">
        <span>${collapsed ? "›" : "⌄"} ${label}</span>
        <span>${count}</span>
      </button>
    `;
  }

  function renderCollapsibleCard(key, title, bodyHtml) {
    const collapsed = state.collapsed[key];
    return `
      <section class="detail-card collapsible">
        <button class="disclosure" onclick="toggleCollapse('${key}')">
          <span>${collapsed ? "›" : "⌄"} ${title}</span>
        </button>
        ${collapsed ? "" : `<div class="card-body">${bodyHtml}</div>`}
      </section>
    `;
  }

  function renderIssues(repo) {
    const activeIssues = activeIssueNumbers(repo);
    document.getElementById("issueCount").textContent = String(repo.issues.length);
    document.getElementById("issueList").innerHTML = repo.issues.length
      ? repo.issues.map((issue) => renderIssue(issue, activeIssues)).join("")
      : `<div class="empty-focus" style="min-height:280px"><h2>No open issues</h2><p>This repo still can have named shells.</p></div>`;
  }

  function renderIssue(issue, activeIssues) {
    const running = activeIssues.has(issue.number);
    const selected = state.mode === "issue" && state.selectedIssueNumber === issue.number;
    const priorityClass = issue.priority === "high" ? "brick" : "";
    const primaryAction = running
      ? `<button class="mini-action primary" onclick="event.stopPropagation(); selectInstanceForIssue(${issue.number})">Jump to session</button>`
      : `<button class="mini-action primary" onclick="event.stopPropagation(); selectIssue(${issue.number})">Launch</button>`;
    return `
      <article class="issue-card ${running ? "running" : ""} ${selected ? "selected" : ""}" onclick="selectIssue(${issue.number})">
        <div class="issue-title">#${issue.number} ${escapeHtml(issue.title)}</div>
        <div class="issue-meta">
          <span class="pill ${running ? "green" : priorityClass}">${running ? "running" : issue.priority}</span>
          <span>${running ? "session" : "open"}</span>
          <span>updated ${issue.updated}</span>
        </div>
        <div class="issue-actions">
          ${primaryAction}
          <button class="mini-action" onclick="event.stopPropagation(); selectIssue(${issue.number})">Details</button>
        </div>
      </article>
    `;
  }

  function renderFocus(repo) {
    if (state.mode === "terminal") {
      const instance = repo.instances.find((item) => item.id === state.selectedInstanceId) ?? repo.instances[0];
      if (!instance) {
        renderRepoFocus(repo);
        return;
      }
      const subtitle = instance.type === "issue"
        ? `${instance.agent} - ${repo.owner}/${repo.name} - branch ${instance.branch} - ttyd :${instance.port}`
        : `Plain shell - ${repo.owner}/${repo.name} - ${repo.path} - ttyd :${instance.port}`;
      document.getElementById("focusHead").innerHTML = `
        <div class="focus-head">
          <div class="focus-title">
            <h1>${escapeHtml(instance.name)}</h1>
            <p>${escapeHtml(subtitle)}</p>
          </div>
          <div class="actions">
            <button class="action" onclick="mockToast('Rename would open an inline session-name editor')">Rename</button>
            <button class="action" onclick="mockToast('Open would launch the terminal in a separate browser tab')">Open</button>
            <button class="action danger" onclick="endSelectedInstance()">End</button>
          </div>
        </div>
      `;
      document.getElementById("focusBody").innerHTML = `
        <div class="terminal-frame">
          <div class="terminal-tabs">
            <span class="term-dot"></span>
            <span>terminal</span>
            <span style="margin-left:auto;color:#9b927f">connected</span>
          </div>
          <div class="terminal">${instance.lines.map((line) => line ? `<div>${line}</div>` : "<br>").join("")}</div>
        </div>
      `;
      return;
    }

    if (state.mode === "issue") {
      const issue = repo.issues.find((item) => item.number === state.selectedIssueNumber) ?? repo.issues[0];
      if (!issue) {
        renderRepoFocus(repo);
        return;
      }
      const running = activeIssueNumbers(repo).has(issue.number);
      document.getElementById("focusHead").innerHTML = `
        <div class="focus-head">
          <div class="focus-title">
            <h1>#${issue.number} ${escapeHtml(issue.title)}</h1>
            <p>${running ? "Running issue" : "Open issue"} - ${issue.priority} priority - ${repo.owner}/${repo.name}</p>
          </div>
          <div class="actions">
            ${running ? `<button class="action primary" onclick="selectInstanceForIssue(${issue.number})">Jump to session</button>` : `<button class="action primary" onclick="launchIssue(${issue.number})">Launch</button>`}
            <button class="action" onclick="mockToast('Open on GitHub would use the issue html_url')">Open on GitHub</button>
          </div>
        </div>
      `;
      document.getElementById("focusBody").innerHTML = `
        <div class="issue-detail">
          ${renderCollapsibleCard("issueBody", "Issue detail", `
            <div class="chip-row">
              <span class="detail-chip ${issue.priority === "high" ? "green" : ""}">priority: ${escapeHtml(issue.priority)}</span>
              ${(issue.labels ?? []).map((label) => `<span class="detail-chip">${escapeHtml(label)}</span>`).join("")}
              <span class="detail-chip">assignee: ${issue.assignees?.length ? issue.assignees.map(escapeHtml).join(", ") : "none"}</span>
            </div>
            <div class="body-copy">${issue.body.map((paragraph) => `<p>${escapeHtml(paragraph)}</p>`).join("")}</div>
            <div class="section-label">Editable fields</div>
            <div class="input-like">Title and body can be edited inline from this detail pane.</div>
            <div class="section-label">Referenced files</div>

  function createShell() {
    const repo = currentRepo();
    const input = document.getElementById("shellName");
    const name = (input?.value || `shell-${state.shellDraftCounter}`).trim();
    const id = `${repo.id}-shell-${Date.now()}`;
    repo.instances.push({
      id,
      type: "shell",
      status: "shell",
      name,
      branch: "main",
      duration: repo.path,
      port: 7800 + state.shellDraftCounter,
      lines: [
        `<span class="prompt">${repo.name} git:(main)</span> zsh`,
        `<span class="muted">named shell ${escapeHtml(name)} created</span>`,
        `<span class="prompt">${repo.name} git:(main)</span> <span class="cursor"></span>`,
      ],
      preview: `named shell ${name} created`,
      previewStatus: "active",
    });
    state.shellDraftCounter += 1;
    selectInstance(id);
  }

  function launchIssue(number) {
    const repo = currentRepo();
    const existing = repo.instances.find((item) => item.issueNumber === number);
    if (existing) {
      selectInstance(existing.id);
      return;
    }
    const issue = repo.issues.find((item) => item.number === number);
    if (!issue) return;
    const id = `${repo.id}-${number}`;
    repo.instances.unshift({
      id,
      type: "issue",
      status: "active",
      name: `#${number} ${issue.title}`,
      issueNumber: number,
      agent: "Codex",
      branch: `issue-${number}-${slugify(issue.title)}`,
      duration: "just now",
      port: 7900 + number,
      lines: [
        `<span class="prompt">${repo.name} git:(issue-${number}-${slugify(issue.title)})</span> codex "${escapeHtml(issue.title)}"`,
        '<span class="muted">context loaded from issue body, comments, and referenced files</span>',
        "Starting Codex session...",
        `<span class="prompt">${repo.name} git:(issue-${number}-${slugify(issue.title)})</span> <span class="cursor"></span>`,
      ],
      preview: "Starting Codex session...",
      previewStatus: "active",
    });
    selectInstance(id);
  }

  function endSelectedInstance() {
    const repo = currentRepo();
    const index = repo.instances.findIndex((item) => item.id === state.selectedInstanceId);
    if (index >= 0) {
      const [removed] = repo.instances.splice(index, 1);
      mockToast(`${removed.name} ended`);
    }
    selectRepoOnly();
  }

  function closeIssue(number) {
    const repo = currentRepo();
    const index = repo.issues.findIndex((item) => item.number === number);
    if (index >= 0) {
      const [removed] = repo.issues.splice(index, 1);
      mockToast(`#${removed.number} closed`);
    }
    selectRepoOnly();
  }

  function cyclePriority(number) {
    const repo = currentRepo();
    const issue = repo.issues.find((item) => item.number === number);
    if (!issue) return;
    issue.priority = issue.priority === "high" ? "normal" : "high";
    mockToast(`Priority set to ${issue.priority}`);
    selectIssue(number);
  }

  function slugify(value) {
    return String(value).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "").slice(0, 28);
  }

  function formatWorktree(worktree) {
    if (!worktree) return "No worktree status available";
    if (!worktree.exists) return `Not created yet - ${worktree.path}`;
    return `${worktree.dirty ? "Dirty" : "Clean"} - ${worktree.path}`;
  }

  function resetColumnWidths() {
    const root = document.querySelector(".workbench");
    root.style.removeProperty("--instances-width");
    root.style.removeProperty("--issues-width");
    mockToast("Column widths reset");
  }

  function mockToast(message) {
    const existing = document.querySelector(".toast");
    if (existing) existing.remove();
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.textContent = message;
    document.body.appendChild(toast);
    window.setTimeout(() => toast.remove(), 1800);
  }

  function initColumnResize() {
    const root = document.querySelector(".workbench");
    const handles = document.querySelectorAll(".resize-handle");
    handles.forEach((handle) => {
      handle.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        handle.classList.add("dragging");
        const target = handle.dataset.resize;
        const startX = event.clientX;
        const style = getComputedStyle(root);
        const variable = target === "instances" ? "--instances-width" : "--issues-width";
        const start = parseInt(style.getPropertyValue(variable), 10) || (target === "instances" ? 284 : 348);
        const onMove = (moveEvent) => {
          const delta = moveEvent.clientX - startX;
          const next = target === "instances"
            ? Math.max(220, Math.min(420, start + delta))
            : Math.max(260, Math.min(520, start - delta));
          root.style.setProperty(variable, `${next}px`);
        };
        const onUp = () => {
          handle.classList.remove("dragging");
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup", onUp);
        };
        window.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup", onUp);
      });
    });
  }

  initColumnResize();
  render();
</script>
</body>
</html>

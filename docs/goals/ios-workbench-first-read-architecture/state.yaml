      summary: "Implemented a bounded iOS WorkbenchPayload contract, APIClient.workbench() fetch method, and pure WorkbenchBootstrap projection for issue summaries, active issue deployments, and priorities without converting partial summaries into full GitHubIssue/PR detail models."

      - "Implementation would remove or bypass drafts, priorities, offline queue behavior, repo filters, issue navigation, or PR navigation."
      - "The Scout/Judge evidence proves the selected slice is no longer safe."
      - "Focused tests fail twice with the same failure."
      - "Mapper would convert partial workbench issue summaries into full GitHubIssue or PR detail models."
      - "Worker cannot distinguish T003 changes from pre-existing dirty worktree changes."

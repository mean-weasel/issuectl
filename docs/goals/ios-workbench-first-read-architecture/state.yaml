version: 2

goal:
  title: "iOS Workbench First-Read Architecture"
  slug: "ios-workbench-first-read-architecture"
  kind: existing_plan
  tranche: "Close the deferred iOS Today/Issues workbench-first-read consistency architecture gap with Scout/Judge evidence before any shared store or mapping implementation."
  status: done
  oracle:
    signal: "A Scout/Judge-backed architecture receipt plus focused implementation tests prove Today/Issues can consume a shared workbench-first-read slice without regressing drafts, priorities, offline state, repo filters, or issue/PR navigation."
    cadence: "after Scout audit, after Judge architecture decision, after each Worker package, and at final audit"
    final_proof: "Final audit maps current-state evidence for Today, Issues, PRs, workbench store/payload, drafts, priorities, offline queue, repo filters, issue navigation, PR navigation, implementation diff, focused tests, and any explicit deferrals."
  intake:
    original_request: "Prep a fresh architecture tranche for iOS Today/Issues workbench-first-read consistency."
    interpreted_outcome: "A fresh GoalBuddy board is ready to audit and then safely close the deferred Today/Issues workbench-first-read architecture gap."
    input_shape: existing_plan
    audience: "issuectl maintainers and iOS users"
    authority: requested
    proof_type: test
    completion_proof: "The board drives a Scout/Judge audit first, then implements the smallest proven safe shared store/mapping slice and verifies no regressions in drafts, priorities, offline state, repo filters, and issue/PR navigation."
    likely_misfire: "Replacing Today/Issues endpoint-specific flows with a workbench payload shortcut that appears consistent but regresses drafts, priorities, offline actions, repo filtering, or detail navigation."
    blind_spots_considered:
      - "The root checkout is dirty with unrelated work; this tranche must not revert or normalize it."
      - "Today, Issues, PRs, and Board may rely on different payload shapes, local cache behavior, and navigation state."
      - "Workbench-first-read consistency may be a mapping/store problem rather than a direct API replacement."
      - "Drafts, priorities, offline queue, repo filters, issue navigation, and PR navigation are regression surfaces, not optional polish."
      - "A large data-layer rewrite could be less safe than a narrow shared mapper or bootstrapping layer."
    existing_plan_facts:
      - "The completed iOS parity tranche deferred Today/Issues workbench-first-read consistency as a broader architecture decision."
      - "The next tranche should begin with Scout/Judge audit instead of implementation."
      - "The smallest safe shared store/mapping slice should be selected only after current code evidence is gathered."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/ios-workbench-first-read-architecture/"
    command: "npx goalbuddy board /Users/neonwatty/Desktop/issuectl/docs/goals/ios-workbench-first-read-architecture"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: low
    objective: "Map current iOS Today/Issues/PRs/workbench data and navigation flows before any architecture decision."
    inputs:
      - "Current git status and branch"
      - "apple/IssueCTL/Views/Today/"
      - "apple/IssueCTL/Views/Issues/"
      - "apple/IssueCTL/Views/PullRequests/"
      - "apple/IssueCTL/Views/Workbench/"
      - "apple/IssueCTL/ViewModels/WorkbenchStore.swift"
      - "apple/IssueCTL/Views/Shared/RepoFilterChips.swift"
      - "apple/IssueCTLShared/Models/"
      - "apple/IssueCTLShared/Services/APIClient*.swift"
      - "apple/IssueCTLTests/"
      - "apple/IssueCTLUITests/"
      - "Prior parity notes mentioning Today/Issues workbench-first-read deferral"
    constraints:
      - "Read-only."
      - "Use the current root worktree as authoritative; do not rely on prior-session memory."
      - "Do not implement or propose the final architecture yet."
      - "Classify each flow as endpoint_specific, shared_candidate, already_workbench_backed, or unsafe_to_replace_without_design."
      - "Explicitly inspect drafts, priorities, offline state, repo filters, issue navigation, and PR navigation."
      - "Record dirty-worktree risks and identify unrelated dirty files that must not be touched."
    expected_output:
      - "Baseline branch, HEAD, and dirty-state summary."
      - "Flow map for Today, Issues, PRs, Board/workbench, drafts, priorities, offline queue, repo filters, issue navigation, and PR navigation."
      - "Source-backed risk matrix."
      - "Candidate smallest shared store/mapping seams, if any, with file paths."
      - "Recommended Judge questions and minimum verification gates."
    receipt:
      result: done
      summary: "Mapped current iOS Today, Issues, PRs, drafts, priorities, offline queue, repo filters, navigation, API client, tests, and web workbench payload/state. iOS has no WorkbenchStore or Views/Workbench in this root; Today/Issues/PRs are endpoint-specific with shared helper seams. Direct workbench payload replacement is unsafe without a bounded bridge."
      evidence:
        - "Receipt file: notes/T001-scout-current-flow-map.md"
        - "Web workbench aggregate endpoint: packages/web/app/api/v1/workbench/route.ts and packages/web/lib/workbench-data.ts"
        - "iOS endpoint-specific flows: apple/IssueCTL/Views/Today/TodayView.swift, apple/IssueCTL/Views/Issues/IssueListView.swift, apple/IssueCTL/Views/PullRequests/PRListView.swift"
        - "Risk surfaces mapped: drafts, priorities, offline queue, repo filters, issue navigation, PR navigation, webhook automation health"
  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Review the Scout audit and select the smallest safe architecture slice."
    inputs:
      - "T001 receipt"
      - "Goal oracle and non-goals"
      - "Current diff after Scout"
    constraints:
      - "Do not implement."
      - "Reject any slice that rewrites the entire data layer without proof a smaller slice is unsafe."
      - "Reject any slice that does not explicitly preserve drafts, priorities, offline state, repo filters, issue navigation, and PR navigation."
      - "Prefer a shared mapper/store bootstrap slice if it can be bounded and verified."
      - "Return exact allowed_files, verification commands, and stop_if conditions for the Worker."
    expected_output:
      - "Decision: proceed | revise_board | blocked"
      - "Chosen architecture slice and rationale."
      - "Rejected architecture alternatives."
      - "allowed_files."
      - "verify commands."
      - "stop_if conditions."
    receipt:
      result: done
      decision: approved
      summary: "Proceed with a bounded iOS WorkbenchPayload contract, APIClient fetch, and pure WorkbenchBootstrap mapper/store projection. Do not wire Today, Issues, PRs, drafts, offline queue, or navigation flows in this slice."
      evidence:
        - "Receipt file: notes/T002-judge-workbench-bootstrap.md"
        - "T001 shows Today/Issues/PRs are endpoint-specific and drafts/offline queue are unsafe to replace without design."
        - "The slice creates executable architecture proof while preserving endpoint-specific screens."
  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Implement the Judge-selected smallest shared store/mapping slice."
    allowed_files:
      - "apple/IssueCTLShared/Models/WorkbenchPayload.swift"
      - "apple/IssueCTLShared/Models/WorkbenchBootstrap.swift"
      - "apple/IssueCTLShared/Services/APIClient+Workbench.swift"

      - "docs/goals/issue-506-507-gap-closure-plan/notes/T001-gap-matrix.md"
      - "Goal oracle"
      - "Current dirty diff"
    constraints:
      - "Read-only."
      - "Do not implement."
      - "Prefer security/lifecycle/data correctness before UX polish."
      - "Choose one coherent vertical slice with bounded allowed_files and verification."
    expected_output:
      - "Decision: approved | revise_matrix | blocked."
      - "Exact Worker objective for T003."
      - "allowed_files for T003."
      - "verify commands for T003."
      - "stop_if conditions for T003."
      - "Any owner decisions required before later slices."
    receipt:
      result: done
      decision: approved
      full_outcome_complete: false
      summary: "Judge approved the T001 matrix despite the branch mismatch and selected lifecycle correctness as the first Worker package: PR review launch/recovery plus terminal-ending notification consistency."
      rationale: "This is the largest coherent safe slice because it addresses P0/P1 lifecycle and data correctness before UX polish, with bounded files and focused tests."

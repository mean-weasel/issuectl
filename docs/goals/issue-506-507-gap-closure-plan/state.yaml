version: 2

goal:
  title: "Issue 506/507 Gap Closure Plan"
  slug: "issue-506-507-gap-closure-plan"
  kind: existing_plan
  tranche: "Validate the three-agent gap audit, implement successive safe verified slices, and finish only when issues #506/#507 are fully satisfied or deviations are owner-approved."
  status: done
  oracle:
    signal: "A refreshed #506/#507 gap matrix, with every gap fixed, owner-approved as deferred/deviated, or proven not applicable, plus targeted verification passing."
    cadence: "after each Worker package and at final audit"
    final_proof: "Final Judge/PM audit maps receipts and verification to #506/#507 and records full_outcome_complete: true."
  intake:
    original_request: "make a detailed plan to fix with goalbuddy:goal-prep"
    interpreted_outcome: "Prepare a GoalBuddy board that can drive implementation of all remaining issue #506/#507 gaps to verified completion."
    input_shape: existing_plan
    audience: issuectl maintainers/operators
    authority: requested
    proof_type: review
    completion_proof: "Final audit confirms all required #506/#507 behavior is implemented or explicitly owner-approved as deferred, with focused tests passing."
    likely_misfire: "Implementing visible UI polish or confirming existing coverage while missing lifecycle/security/privacy gaps that the specs treat as invariants."
    blind_spots_considered:
      - "Spec tension: #506 says users supply tunnels, while #507 asks onboarding to resolve/start cloudflared."
      - "Crash recovery and transaction safety may need schema/data migration care."
      - "Webhook raw payload UI can expose private issue/comment data."
      - "Passing unit tests may not prove live-tail, route, notification, or UX parity."
      - "CLI/API command names may intentionally diverge, but deviations need explicit owner approval."
      - "Credential isolation is partially implemented and may require a policy decision if file-system credentials are in scope."
    existing_plan_facts:
      - "Agent A found backend coverage is broad but flagged kill-switch notifications, PR review recovery, PR launch transition safety, file-based credential inheritance, default child budgets, completion result shape, CLI additions, and diagnostic naming."
      - "Agent B found UX routes exist but flagged cloudflared onboarding, settings health/detail gaps, partial threading, missing session detail triggered-by block, review detail gaps, webhook log/live-tail gaps, retention configurability, and incomplete diagnostics for settings mutations."
      - "Agent C found cross-cutting coverage is broad but flagged PR review timestamp units, raw payload redaction, hard-coded retention, API/web parity, API removal parity, webhook log search ambiguity, and softer CLI onboarding."
      - "The board was created assuming branch codex/issue-506-507-gap-fixes, but T001 current-state evidence found this checkout on main."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/issue-506-507-gap-closure-plan/"
    command: "npx goalbuddy board docs/goals/issue-506-507-gap-closure-plan"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Refresh the #506/#507 gap matrix against current code and classify each audit finding as true gap, already fixed, acceptable deviation needing owner approval, or duplicate."
    inputs:
      - "GitHub issue #506 canonical body and comments"
      - "GitHub issue #507 canonical body and comments"
      - "Three-agent audit summary from the prior Codex turn"
      - "Current repo code on branch codex/issue-506-507-gap-fixes"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Prefer exact file-path evidence and line refs."
      - "Group duplicates across agents."
      - "Separate security/lifecycle blockers from UX polish."
    expected_output:
      - "Deduplicated gap matrix with priority P0/P1/P2."
      - "For each gap: issue source (#506/#507), evidence path, proposed fix slice, verification command."
      - "List of findings that appear to be acceptable spec deviations but need owner approval."
      - "Recommended first Worker slice."
    receipt:
      result: done
      summary: "Scout plus PM validation refreshed the #506/#507 gap matrix. Current checkout is main, not the assumed codex branch. Broad webhook/session/mutation coverage exists, but lifecycle recovery, kill-switch notifications, raw payload redaction, timestamp units, child-action budgets, completion metadata, API/CLI parity, retention configurability, and UX details remain."
      note: "notes/T001-gap-matrix.md"
      evidence:
        - "packages/web/lib/webhook-pr-intent.ts:105"
        - "packages/web/lib/webhook-intent-worker.ts:304"
        - "packages/web/app/logs/webhooks/page.tsx:294"
        - "packages/web/components/reviews/ReviewDetailPanel.tsx:219"
        - "packages/core/src/launch/launch-contexts.ts:105"
      contradictions:
        - "Goal intake expected codex/issue-506-507-gap-fixes, but `git status --short --branch` reported main."
      ambiguity_requiring_judge:
        - "Decide whether to continue on main or switch/rebase to codex/issue-506-507-gap-fixes before Worker work."
        - "Classify #506/#507 tunnel onboarding conflict: user-supplied tunnel vs managed cloudflared quick tunnel."
        - "Confirm whether raw payload mode may ever display full payload in dashboard or must always redact by default."

  - id: T002

        - "Tunnel onboarding policy: user-supplied tunnel only versus managed `cloudflared`."
        - "Whether dashboard may ever expose full raw webhook payloads or must always redact by default."
        - "Whether `/api/webhooks/github` alias is required."
        - "Whether label-removal should kill comment-command sessions."
        - "Whether CLI command/name deviations are acceptable."


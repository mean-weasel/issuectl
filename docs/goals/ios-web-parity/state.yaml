version: 2

goal:
  title: "iOS Web Parity"
  slug: "ios-web-parity"
  kind: existing_plan
  tranche: "Execute docs/superpowers/plans/2026-05-28-ios-web-parity.md through verified iOS/web slices, starting with fresh-worktree reconciliation and contract/API validation."
  status: done
  oracle:
    signal: "After each Worker package, run that slice's listed verification commands and update a receipt showing how the changed behavior moves iOS toward web workbench, webhook automation, Board, and issue/PR session parity."
    cadence: "after each Worker package and at final audit"
    final_proof: "Final Judge audit maps every acceptance criterion from docs/superpowers/plans/2026-05-28-ios-web-parity.md to passing tests, simulator QA evidence, an explicit deferral, or a recorded blocker before full_outcome_complete can be true."
  intake:
    original_request: "Use a fresh worktree to analyze the current web workbench, webhook automation, dashboard, and related changes, then plan and implement iOS parity in a consistent measurable way."
    interpreted_outcome: "The iOS app reflects the current web app's workbench, cross-repo board, issue/PR session model, webhook automation settings, and automation-label flows."
    input_shape: existing_plan
    audience: "issuectl maintainers and iOS users"
    authority: requested
    proof_type: test
    completion_proof: "iOS uses the current workbench contract, shows a native board, handles issue and PR sessions correctly, exposes automation/webhook settings, supports auto-launch and auto-review labels, and passes focused web/core/iOS tests plus final simulator QA."
    likely_misfire: "Shipping a visible iOS board while leaving the actual workbench data contract, PR session target handling, webhook health, and automation labels stale."
    blind_spots_considered:
      - "The fresh worktree does not include dirty active-checkout changes; reconcile before coding."
      - "Some needed web routes may only exist as server actions, not REST endpoints usable by iOS."
      - "Webhook health may require GitHub calls and should not slow every board refresh."
      - "Existing iOS screens own independent fetch flows and need incremental migration."
      - "Swift file additions may require XcodeGen and can cause generated project churn."
      - "PR auto-review should remain label-driven unless backend support for manual PR launch already exists."
    existing_plan_facts:
      - "Source implementation plan: docs/superpowers/plans/2026-05-28-ios-web-parity.md."
      - "Fresh main-based checkout: /Users/neonwatty/Desktop/issuectl/.worktrees/ios-web-parity-main at GitHub main c309bef6f127d1326810f5d428fd3f28b988c48c."
      - "Current active checkout has uncommitted web/core/apple changes that must be reconciled before overlapping edits."
      - "The intended iOS tabs after implementation are Today, Board, Issues, PRs, and Active."
      - "The web workbench aggregate endpoint is GET /api/v1/workbench."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed


# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Webhook Auto-Sessions Gap Closure"
  slug: "webhook-auto-sessions-gap-closure"
  kind: existing_plan
  tranche: "Close remaining issue #506 gaps after PR #510 through successive safe verified implementation slices."
  status: superseded
  superseded_by:
    goal: "docs/goals/issue-506-follow-up-gap-fixes/goal.md"
    reason: "PR #511 and later issue #506 follow-up audits superseded this active plan; historical receipts remain unchanged."
  oracle:
    signal: "Issue #506 gap matrix remains current, and every required gap is implemented with focused verification or explicitly blocked/deferred with an approved artifact."
    cadence: "after each Worker package, at each phase boundary, and at final audit"
    final_proof: "Final Judge/PM receipt maps issue #506 requirements and the four subagent audit findings to done/blocked/deferred status, cites passing verification, and records full_outcome_complete: true."
  intake:
    original_request: "make a detailed plan with $goalbuddy:goal-prep to cover all these gaps"
    interpreted_outcome: "Prepare a GoalBuddy board that can drive implementation of all remaining issue #506 webhook auto-session gaps after PR #510."
    input_shape: existing_plan
    audience: "issuectl maintainers and webhook-session users"
    authority: requested
    proof_type: test
    completion_proof: "All required issue #506 gaps are closed by receipts with tests/typechecks/lints or converted into explicit approved follow-up/blocker records."
    likely_misfire: "Stopping after another receiver-hardening slice while issue auto-launch, lifecycle controls, PR session readiness, and user-facing configuration remain missing."
    blind_spots_considered:
      - "Webhook worker was not wired into the server."
      - "Webhook diagnostics and retention were not implemented."
      - "Issue auto-launch requires gating, control events, locking, launch integration, and completion semantics."
      - "PR auto-review is blocked by issue-shaped deployments and missing mutation-security controls."
      - "Dashboard/API/CLI controls and docs are mostly absent."
    existing_plan_facts:
      - "Issue #506 defines phases 1 through 7 for GitHub webhooks and auto-sessions."
      - "PR #510 merged the receiver/storage foundation."
      - "Subagent audit 1 found Phase 1 gaps: worker scheduling, diagnostics, hook/repo ID binding, retention, CLI filters, and no-secret logging tests."
      - "Subagent audit 2 found Phase 2 issue auto-launch is not implemented."
      - "Subagent audit 3 found PR review/session/security phases are mostly unimplemented and blocked by target/session and mutation model decisions."
      - "Subagent audit 4 found CLI/API/dashboard/docs/notification surfaces are mostly unwired."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/webhook-auto-sessions-gap-closure/"
    command: "npx goalbuddy board /Users/neonwatty/Desktop/issuectl/docs/goals/webhook-auto-sessions-gap-closure"


        - "packages/web/components/repos/RepoSettingsPanel.tsx:241 and :248 issue/review agent selects are not disabled when autoLaunchIssues/autoReviewPrs are false."
        - "packages/web/components/settings/AddRepoForm.tsx:22 AutomationState lacks reviewPreamble; lines 90-107 advance Identify -> Automation without an explicit Verify action; lines 257-334 render automation controls without preamble."
        - "packages/web/lib/actions/repos.ts:89-99 verifies repo existence inside addRepo submit, so the Add Repo Verify gap is UX/staging rather than missing backend validation."
        - "packages/web/lib/actions/repos.ts:66-74 AddRepoOptions lacks reviewPreamble even though updateRepo supports it at lines 377-388 and tests cover update at packages/web/lib/actions/repos.test.ts:193."
        - "packages/cli/src/commands/repo.ts:59-67 only stores automation settings and prints next steps; lines 335-345 tell users to run webhook create later."
        - "packages/cli/src/commands/repo.ts:70-103 removes local repo tracking and sessions but does not call GitHub deleteWebhook before core remove."
        - "packages/cli/src/commands/webhook.ts:220-309 registers only tail/status/create/rotate; rg found no replay/intents/fire/drop command implementation."
        - "packages/cli/src/commands/webhook.ts:240 filters after listWebhookEvents(db, limit), while packages/core/src/db/webhooks.ts:337 supports DB-level filters."
        - "packages/web/lib/webhook-events-stream.test.ts:14 covers helper functions only; packages/web/e2e has no logs/webhooks, sessions page, review detail, or repo settings route spec."
        - "docs/specs/2026-05-23-webhooks-design.md:38-48 documents only status/tail/create/rotate and repo add/update/set/show, not the #507 operator override commands."
      canonical_gaps:
        - "P1: Add committed live-tail/route coverage for /logs/webhooks stream behavior and new operator routes."
        - "P2: Add explicit rotate-secret confirmation and disable repo settings agent selectors when their automation switch is off."
        - "P2: Add Add Repo Step 1 Verify gate plus optional PR review preamble that persists through addRepo."
        - "P2: Close CLI repo add/remove parity or scope it explicitly: add should install webhook/labels/wait for first ping when configured; remove should best-effort delete stored GitHub webhook."
        - "P2 decision: implement or explicitly defer operator override CLI replay/intents/fire/drop and update UI/docs accordingly."
        - "Low: Make webhook tail pass repo/target filters into listWebhookEvents before limiting."

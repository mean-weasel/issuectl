# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Close Issue 506/507 Remaining Gaps"
  slug: "issue-506-507-gap-closure"
  kind: specific
  tranche: "Complete successive safe verified implementation and coverage slices until every sub-agent-reported #506/#507 gap is fixed or explicitly deferred with proof."
  status: done
  oracle:
    signal: "Final audit maps every reported gap to implemented code plus focused passing verification, or to an explicit documented deferral decision."
    cadence: "after each Worker package and at final audit"
    final_proof: "Receipts for validation, implementation, tests/docs, focused package checks, and a final Judge/PM audit with full_outcome_complete: true."
  intake:
    original_request: "Make a detailed plan using GoalBuddy to fill the gaps found by the sub-agents."
    interpreted_outcome: "Prepare an execution board that will fill the remaining #506/#507 app, CLI, UX, and coverage gaps."
    input_shape: specific
    audience: "issuectl maintainers and webhook auto-session operators"
    authority: requested
    proof_type: test
    completion_proof: "Focused tests/checks pass for touched packages, route/WebSocket coverage exists, UX/CLI gaps are fixed or explicitly deferred, and final audit maps all original findings."
    likely_misfire: "Stopping after a plan, a few easy UI tweaks, or coverage-only work while CLI onboarding/removal and operator override parity remain unresolved."
    blind_spots_considered:
      - "CLI GitHub webhook install/remove behavior may need mocks and credential-safe testing."
      - "Operator override commands may be a product decision: implement now or clearly mark deferred."
      - "Live-tail route coverage may reveal real WebSocket/client defects."
      - "Add Repo verification and review preamble may already have partial backend support that must be reused rather than duplicated."
    existing_plan_facts:
      - "Gap 1: missing webhook live-tail E2E/integration coverage."
      - "Gap 2: CLI repo add/remove lacks webhook install/remove parity."
      - "Gap 3: repo settings rotate secret lacks explicit confirmation."
      - "Gap 4: Add Repo wizard lacks explicit Verify flow and PR review preamble override."
      - "Gap 5: repo settings agent selectors stay enabled while automation is off."
      - "Gap 6: operator override CLI replay/intents/fire/drop is absent or undocumented."
      - "Lower-priority gap: webhook tail filters after global limiting."
      - "Not gaps for this tranche: Apple mirroring, push notifications, direct local PR fix-push behavior."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/issue-506-507-gap-closure/"
    command: "npx goalbuddy board docs/goals/issue-506-507-gap-closure"

active_task: null


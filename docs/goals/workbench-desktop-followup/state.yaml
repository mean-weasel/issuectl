version: 2

goal:
  title: "Workbench Desktop Follow-Up"
  slug: "workbench-desktop-followup"
  kind: existing_plan
  tranche: "Desktop-scoped Workbench dogfood-readiness fixes from functionality, UX, and styling critiques."
  status: complete
  intake:
    original_request: "Work out design choices, then use Goal Buddy Prep to create a succinct granular task list with explicit acceptance criteria for the Workbench fixes."
    interpreted_outcome: "A desktop-scoped GoalBuddy board exists for implementing the agreed Workbench follow-up fixes with clear acceptance criteria and verification gates."
    input_shape: existing_plan
    audience: "Jeremy as desktop Workbench operator and future GoalBuddy/Codex workers."
    authority: approved
    proof_type: test
    completion_proof: "Final audit maps verified desktop Workbench changes, updated QA docs, and automated coverage back to all critique findings."
    likely_misfire: "Treating this as generic visual polish while leaving terminal failure, session discoverability, issue mutation safety, deployment history, URL focus, or QA-doc drift unresolved."
    blind_spots_considered:
      - "Mobile/narrow Workbench is explicitly out of scope for this run; QA expectations must say so."
      - "Terminal failure detection may need a pragmatic iframe/proxy error slice before any deeper terminal protocol work."
      - "URL-addressable focus can affect reducer/path initialization and reload/back-forward behavior."
      - "Empty-repo full-suite instability is a reliability gap that should not block product UX fixes."
    existing_plan_facts:
      - "Functionality critique found no blocking API gap but flagged launch/session discoverability, URL focus state, skipped empty-repo coverage, and deployment-history labeling."
      - "UX critique flagged terminal iframe failure visibility, mutation-heavy issue details, deployment history ambiguity, manual dogfood doc drift, and mobile/narrow scope ambiguity."
      - "Styling critique flagged mobile off-screen layout, ambiguous drawer restore controls on narrow screens, issue queue card density, issue detail hierarchy, and terminal failure styling."
      - "User approved the recommended design choices and scoped this run to desktop."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/workbench-desktop-followup/"
    command: "npx goalbuddy board /Users/neonwatty/Desktop/issuectl/docs/goals/workbench-desktop-followup"
    open_method: "regular_browser_fallback"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate this desktop-scoped follow-up plan before implementation and confirm the first Worker slice."
    inputs:
      - "Three critique receipts from functionality, UX, and styling agents."
      - "docs/goals/workbench-desktop-followup/goal.md"
      - "docs/goals/workbench-desktop-followup/state.yaml"
    constraints:
      - "Read-only."
      - "Do not implement product changes."
      - "Preserve the user-approved design choices unless a concrete code/test conflict is found."
    acceptance_criteria:
      - "Judge confirms mobile/narrow Workbench is out of scope for this run and belongs only in QA expectation cleanup."
      - "Judge confirms task order is safe or revises it with rationale."
      - "Judge names the largest safe first Worker slice with allowed files and verification commands."
    expected_output:
      - "Decision: approved | revise_before_worker."
      - "First Worker slice recommendation."
      - "Any blockers or scope corrections."
    receipt:
      result: done
      decision: approved
      full_outcome_complete: false
      summary: "Judge approved the desktop-scoped follow-up board. Mobile/narrow Workbench redesign is out of scope except QA expectation cleanup. Task order is safe, and T002 is the first Worker slice."
      evidence:
        - "goal.md states desktop-only scope and names mobile/narrow Workbench redesign as a non-goal."
        - "state.yaml intake and blind spots record mobile/narrow Workbench as out of scope and QA expectations as the cleanup target."
        - "T002 includes objective, allowed_files, verify command, stop_if conditions, and acceptance criteria."
      required_board_updates:
        - "Activate T002 as the first Worker slice."
        - "Use T002 allowed_files only."
        - "Use T002 verification command."
  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: default
    objective: "Align desktop QA and manual dogfood documentation with the agreed Workbench scope and drawer policy."
    inputs:
      - "T001 Judge receipt"
      - "docs/workflows/workbench-user-workflows.md"
      - "docs/qa/workbench-ux-review-2026-05-18.md"
      - "docs/qa/workbench-validation.md"
      - "packages/web/e2e/workbench.spec.ts"
    allowed_files:
      - "docs/workflows/workbench-user-workflows.md"
      - "docs/qa/workbench-ux-review-2026-05-18.md"
      - "docs/qa/workbench-validation.md"
      - "packages/web/e2e/workbench.spec.ts"
    verify:
      - "pnpm --filter @issuectl/web exec playwright test e2e/workbench.spec.ts --project=desktop-chromium --grep \"supports top nav modes|collapses workbench drawers|keeps compact header controls\""
    stop_if:
      - "Docs require mobile/narrow Workbench acceptance for this run."
      - "Tests and docs disagree on desktop drawer policy after edits."
    acceptance_criteria:
      - "Manual workflow no longer references removed section toggles such as Toggle sessions section."
      - "Manual QA states desktop is the target for this tranche and mobile/narrow redesign is out of scope."
      - "Issue focus expectations say repo issues remain prioritized while sessions may collapse."
      - "Terminal focus expectations say sessions remain prioritized while repo issues may collapse."
      - "Global Issues, Board, and Settings expectations say side panes collapse."
      - "Any narrow/mobile test text is scoped to header reachability or explicitly marked non-acceptance for main Workbench usability."
    expected_output:
      - "Changed docs/tests."
      - "Short summary of QA expectation updates."
      - "Verification command results."
    receipt:
      result: done
      full_outcome_complete: false
      summary: "Aligned desktop Workbench QA/manual workflow expectations with the approved desktop-only scope and current drawer policy. Removed stale section-toggle workflow language, documented issue/terminal drawer prioritization, and clarified that 390px/768px checks are header/control reachability only, not mobile body-layout acceptance."

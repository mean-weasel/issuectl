version: 2

goal:
  title: "Complete Issue 506 Gap Closure"
  slug: "issue-506-complete-gap-closure"
  kind: existing_plan
  tranche: "Fix every remaining issue #506 audit gap through successive safe verified slices."
  status: active
  oracle:
    signal: "Final audit maps every three-agent audit gap to a verified fix or explicit blocker, with focused tests and package checks for touched areas."
    cadence: "after each Worker package and at final audit"
    final_proof: "Judge/PM final receipt with full_outcome_complete: true plus test/typecheck/lint/browser evidence as applicable."
  intake:
    original_request: "use $goalbuddy:goal-prep to make plan to fix all"
    interpreted_outcome: "Prepare a GoalBuddy board that will drive implementation until all remaining issue #506 gaps are closed."
    input_shape: existing_plan
    audience: "issuectl maintainer and dogfooding user"
    authority: requested
    proof_type: test
    completion_proof: "All audit gaps are fixed or explicitly blocked, with verification receipts and final audit approval."
    likely_misfire: "Stopping after planning, docs, or CLI/UI polish while backend lifecycle, PR review safety, and target-aware diagnostics remain incomplete."
    blind_spots_considered:
      - "PR review locks can wedge when deployments end outside agent completion."
      - "Repo automation flag disable needs immediate kill-switch behavior, not only future intent handling."
      - "PR review direct-push semantics may need a larger daemon-mediated Git object strategy."
      - "Dashboard settings and event log gaps need browser-level verification, not only unit tests."
      - "Diagnostics need queryable target identity for PRs, not JSON-only target metadata."
    existing_plan_facts:
      - "Three independent read-only agents audited issue #506 after it was closed."
      - "Receiver/schema/issue launch audit found unlabel kill-switch, repo flag disable, debounce cap, queue-depth, and recovery diagnostic gaps."
      - "PR/security audit found PR review lock, issue-shaped manual end/UI, PR diagnostics, PR workspace/head verification, daemon push, and protected/default branch gaps."
      - "CLI/UI/docs audit found command-shape, CLI validation, dashboard settings, webhook event log, completion summary, PR review history, and stale docs gaps."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/issue-506-complete-gap-closure/"
    command: "npx goalbuddy board docs/goals/issue-506-complete-gap-closure"


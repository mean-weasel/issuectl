      - "allowed_files"
      - "verify"
      - "stop_if"
    receipt:
      result: done
      decision: approved
      full_outcome_complete: false
      rationale: "Decision: split. PR checkout/head safety is a bounded local Worker slice. True local commit upload is not safe to bundle: current push only updateRef's a supplied SHA, without uploading local commits or verifying local branch/remote state. Approve a fail-closed first slice that checks out PR head workspaces and disables direct push until a daemon-owned upload design exists."
      evidence:
        - "T020 receipt: PR lifecycle/targeting done; stop_if explicitly deferred daemon push redesign."
        - "Issue #506 requires same-repo, non-default, unprotected PR head, local checkout/remote match, final refetch, and daemon budget before push."
        - "packages/web/lib/webhook-pr-launch.ts passes generated branchName pr-{number}-{slug}, not pull.headRef."
        - "packages/core/src/launch/workspace.ts creates/checks out local issue-style branches from default branch, not PR head refs."
        - "packages/web/lib/agent/mutations.ts final-refetches PR state and budgets push, but does not verify local checkout/remote."
        - "packages/web/lib/agent/mutation-adapters.ts push calls GitHub updateRef with payload.newSha; it does not upload local commit objects."
      blocked_tasks:
        - "True daemon-mediated local commit upload: blocked pending design for daemon-owned git object upload or git push execution, object existence validation, local workspace binding, and credential model."
      missing_evidence:
        - "No current implementation proves agent-created local commits are uploaded to GitHub before updateRef."
        - "No current implementation proves PR review workspace branch and remote URL match the intended PR head before mutation."
      required_board_updates:
        - "Activate T040 as fail-closed PR workspace/head verification slice."
        - "Add a follow-up blocked task for true local commit upload semantics after T040."


version: 2

goal:
  title: "Workbench Quality Follow-Up"
  slug: "workbench-quality-followup"
  kind: existing_plan
  tranche: "Desktop-scoped Workbench functionality, UX, styling, accessibility, and QA evidence fixes from three independent critiques."
  status: done
  intake:
    original_request: "Make a detailed to-do list for the Workbench critique items so we can drive development using Goal Buddy Prep."
    interpreted_outcome: "A GoalBuddy board exists with granular, sequenced Workbench follow-up tasks, explicit acceptance criteria, verification commands, and a local live board."
    input_shape: existing_plan
    audience: "Jeremy as desktop Workbench operator and future GoalBuddy/Codex workers."
    authority: approved
    proof_type: test
    completion_proof: "Final audit maps the three critique reports to verified Workbench fixes, updated QA docs, and focused Playwright/typecheck evidence."
    likely_misfire: "Treating this as generic polish while leaving direct subpath auth, misleading issue actions, focus management, 1100px clipping, or screenshot reliability unresolved."
    blind_spots_considered:
      - "Mobile/narrow Workbench body redesign is out of scope for this tranche."
      - "Live GitHub mutation should stay gated and manual; automated tests should use fixtures/mocks."
      - "Issue-card styling may deserve a small shared primitive only if it reduces real drift without broad refactor risk."
      - "The existing Workbench suite has one configured retry; new tests should avoid increasing flake."
    existing_plan_facts:
      - "Functionality critique found direct submode auth bootstrapping, missing labels, synthetic title editing, misleading Launch action, and weak mutation feedback."
      - "UX critique independently found misleading issue queue actions, missing focus movement, weak session discoverability, under-labeled repo context, and stale dogfooding docs."
      - "Styling critique found restore-control overlap, unreliable screenshot evidence, inconsistent issue-card styling, possible 1100px clipping, low-contrast terminal fixture proof, and heavy issue-detail hierarchy."
      - "User selected a local live GoalBuddy board."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/workbench-quality-followup/"
    command: "npx goalbuddy board /Users/neonwatty/Desktop/issuectl/docs/goals/workbench-quality-followup"
    open_method: "regular_browser_fallback"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate this Workbench quality follow-up board before implementation and confirm the safest first Worker slice."
    inputs:
      - "Three critique receipts from functionality, UX, and styling sub-agents."
      - "docs/goals/workbench-quality-followup/goal.md"
      - "docs/goals/workbench-quality-followup/state.yaml"
      - "Current Workbench files and tests."
    constraints:
      - "Read-only."
      - "Do not implement product changes."
      - "Preserve desktop scope; mobile/narrow body redesign stays out of scope."
    acceptance_criteria:
      - "Judge confirms the task order is safe and preserves all critique findings."
      - "Judge confirms the first Worker slice is the largest safe useful slice, not merely the smallest edit."
      - "Judge records any required sequencing corrections or blockers on the task receipt."
      - "Judge confirms the board has enough acceptance criteria and verification commands to start execution."
    expected_output:
      - "Decision: approved | revise_before_worker."
      - "Recommended first Worker task and any sequencing changes."
      - "Blockers, if any."
    receipt:
      result: done
      decision: approved
      full_outcome_complete: false
      summary: "Judge approved the board for execution. T002 is the largest safe useful first Worker slice because it is a bounded vertical auth bootstrapping fix for direct Workbench subpaths. No blocker prevents starting T002."
      evidence:
        - "goal.md lists all controlling findings from the functionality, UX, and styling critiques."
        - "state.yaml maps findings into T002-T010, followed by docs refresh and final audit."
        - "Desktop scope is explicit; mobile/narrow body redesign remains out of scope."
        - "T002 has allowed files, acceptance criteria, verification commands, and stop conditions."
      required_board_updates:
        - "Before executing T011, change its rg verification into an explicit negative stale-text check; the current plain rg command succeeds when stale terms are found and fails when none are found."

  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: default
    objective: "Fix direct Workbench subpath API-token bootstrapping so fresh-browser loads of global modes can perform authenticated client actions."
    inputs:
      - "T001 Judge receipt."
      - "Functionality finding: `/workbench` seeds `apiToken`, but `/workbench/<mode>` does not."
      - "packages/web/app/workbench/page.tsx"
      - "packages/web/app/workbench/[mode]/page.tsx"
      - "packages/web/components/workbench/workbench-api.ts"
      - "packages/web/e2e/workbench.spec.ts"
    allowed_files:
      - "packages/web/app/workbench/page.tsx"
      - "packages/web/app/workbench/[mode]/page.tsx"
      - "packages/web/components/workbench/WorkbenchShell.tsx"
      - "packages/web/e2e/workbench.spec.ts"
    verify:
      - "pnpm --filter @issuectl/web typecheck"
      - "pnpm --filter @issuectl/web exec playwright test e2e/workbench.spec.ts --project=desktop-chromium --grep \"direct-load|quick create|pull requests|settings\""
    stop_if:
      - "Subpath token generation requires changing the API authentication contract."
      - "A direct-load test would need real GitHub credentials instead of fixture/mocked requests."
    acceptance_criteria:
      - "Fresh browser context loading `/workbench/quick-create` can call parse/draft/create APIs with an `Authorization: Bearer ...` header without first visiting `/workbench`."
      - "Fresh browser context loading `/workbench/prs` can call PR APIs with the bearer token when fixture routes request it."
      - "Fresh browser context loading `/workbench/settings` can save settings with the bearer token when fixture routes request it."
      - "Existing `/workbench` token bootstrapping behavior still works."
      - "No token is logged or rendered visibly in the UI."
    test_coverage:
      - "Add or extend Playwright direct-load coverage in `packages/web/e2e/workbench.spec.ts` for at least one authenticated subpath action."
    receipt:
      result: done
      full_outcome_complete: false
      summary: "Fixed direct Workbench subpath API-token bootstrapping. `/workbench/[mode]` now generates and passes the same API token as `/workbench`, and WorkbenchShell writes it in a layout effect so subpath child effects can make authenticated client requests on first load."
      changed_files:
        - "packages/web/app/workbench/[mode]/page.tsx"
        - "packages/web/components/workbench/WorkbenchShell.tsx"
        - "packages/web/e2e/workbench.spec.ts"
      commands:
        - cmd: "pnpm --filter @issuectl/web typecheck"
          status: pass
        - cmd: "pnpm --filter @issuectl/web exec playwright test e2e/workbench.spec.ts --project=desktop-chromium --grep \"direct-load|quick create|pull requests|settings\""
          status: pass
      verification:
        - "pnpm --filter @issuectl/web typecheck — passed."
        - "pnpm --filter @issuectl/web exec playwright test e2e/workbench.spec.ts --project=desktop-chromium --grep \"direct-load|quick create|pull requests|settings\" — 4 passed."
      evidence:
        - "New fresh-browser test loads `/workbench/settings` without localStorage setup and verifies settings, health, user, and save requests include `Authorization: Bearer ${apiToken}`."
        - "Existing quick-create, pull-requests, and settings authenticated paths still pass."


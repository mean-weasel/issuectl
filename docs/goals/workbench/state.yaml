version: 2

goal:
  title: "Workbench Implementation"
  slug: "workbench"
  kind: existing_plan
  tranche: "Implement /workbench from docs/superpowers/plans/2026-05-16-workbench.md through safe verified PR batches."
  status: complete
  intake:
    original_request: "Use docs/superpowers/plans/2026-05-16-workbench.md to prepare a GoalBuddy board for implementing /workbench."
    interpreted_outcome: "/workbench is implemented as the repo-scoped issue/session manager described by the mockup and plan, with automated tests, Playwright artifact proof, PR review, green CI, and final audit."
    input_shape: existing_plan
    audience: "Jeremy as issuectl operator and future GoalBuddy/Codex workers."
    authority: requested
    proof_type: test
    completion_proof: "Final Judge/PM audit maps completed PR batches, passing verification commands, Playwright coverage matrix, CLI screenshots, QA report, and green CI back to the original /workbench outcome."
    likely_misfire: "Shipping cosmetic dashboard changes or another issue list page while missing repo-scoped instance management, side-pane collapse semantics, or real API-backed launch/session behavior."
    blind_spots_considered:
      - "Named plain shells are not supported by current APIs and need a Judge decision before implementation."
      - "Playwright CLI screenshots must be acceptance evidence, not optional notes."
      - "PR review, CI monitoring, and merge criteria must be part of execution."
      - "Existing dashboard routes must remain intact."
    existing_plan_facts:
      - "Source plan: docs/superpowers/plans/2026-05-16-workbench.md"
      - "Mockup source: docs/mockups/workbench.html"
      - "Plan includes fixture contract, traceability matrix, objective UI standards, Playwright E2E/CLI coverage, 16 tasks, named-shell split, and PR/CI workflow."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/workbench/"
    command: "npx goalbuddy board /Users/neonwatty/Desktop/issuectl/docs/goals/workbench"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null


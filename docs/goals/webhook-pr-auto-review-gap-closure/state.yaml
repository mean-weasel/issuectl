# GoalBuddy v2 state.yaml
version: 2

goal:
  title: "Webhook PR Auto-Review Gap Closure"
  slug: "webhook-pr-auto-review-gap-closure"
  kind: existing_plan
  tranche: "Resolve issue #506 gaps left after webhook-auto-sessions-gap-closure: daemon mutation gateway, PR auto-review execution, comment-command lifecycle handlers, notifications, webhook management, and final audit."
  status: done
  oracle:
    signal: "Webhook PR intents can safely launch PR-target review sessions only after daemon-mediated mutation authority, completion check-ins, action budgets, final PR ref safety, diagnostics, and notifications are verified."
    cadence: "after each Worker package, at each security/launch boundary, and at final audit"
    final_proof: "Final Judge receipt maps all remaining issue #506 requirements to done/block/defer status, cites passing core/web/cli test/typecheck/lint and git diff --check, and records full_outcome_complete: true only if no required Worker remains."
  intake:
    original_request: "make a detailed plan to address these gaps using $goalbuddy:goal-prep"
    interpreted_outcome: "Prepare a GoalBuddy continuation board that can execute the remaining issue #506 PR auto-review, mutation-security, comment lifecycle, notification, and webhook-management gaps."
    input_shape: existing_plan
    audience: "issuectl maintainers and webhook-triggered session users"
    authority: requested
    proof_type: test
    completion_proof: "Every remaining issue #506 gap is implemented with focused verification, or explicitly blocked/deferred with owner decisions and artifacts."
    likely_misfire: "Enabling PR auto-review launch while agents can still mutate GitHub outside a daemon-enforced gateway or without final PR ref safety."
    blind_spots_considered:
      - "Daemon endpoint can become a broad local mutation API if completion tokens and target binding are weak."
      - "Action budgets need persistence and diagnostics, not prompt text."
      - "PR review pushes can self-trigger synchronize loops."
      - "Comment-command launch/review/end should not bypass mutation controls."
      - "Notification transport should not send duplicates."
      - "Webhook creation/rotation touches GitHub credentials and should remain explicit."
    existing_plan_facts:
      - "Previous board completed receiver hardening, issue auto-launch, target/session substrate, PR reservation, credential scrubbing, parser/auth for comment commands, visibility/docs, notification claim semantics, and full core-suite fixture cleanup."
      - "Previous final audit recorded full_outcome_complete=false."
      - "T009D was blocked on owner/security decisions."
      - "T013 local artifact lists deferred work in docs/goals/webhook-auto-sessions-gap-closure/notes/t013-follow-up-artifacts.md."
      - "Current known verification passed for core/web/cli tests, typechecks, lints, and git diff --check after T014."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  no_completion_on_weak_proof: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/webhook-pr-auto-review-gap-closure/"
    command: "npx goalbuddy board /Users/neonwatty/Desktop/issuectl/docs/goals/webhook-pr-auto-review-gap-closure"


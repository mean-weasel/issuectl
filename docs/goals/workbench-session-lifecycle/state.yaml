        - "docs/qa/workbench-artifacts/workbench-session-workflow-live-152-timeout-state.png"
        - "docs/qa/workbench-artifacts/workbench-session-workflow-live-152-terminal-timeout.png"
        - "docs/qa/workbench-artifacts/workbench-session-workflow-live-152-ended.png"

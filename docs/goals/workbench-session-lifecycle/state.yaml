          status: "covered"
          evidence: "Live #152 reopen receipt plus browser-refresh/session-card checks."
        - workflow: "03-reconnect-stopped-ttyd"
          status: "covered"
          evidence: "Live reconnect receipt and mocked reconnect route coverage."
        - workflow: "04-end-session-cancel-confirm"
          status: "covered"
          evidence: "Live cancel/confirm receipt and e2e assertions for 0 cancel end requests, 0 navigations, and confirm removal."
        - workflow: "05-stale-deployment-reconciliation"
          status: "covered"
          evidence: "Mocked stale reconnect and stale selected terminal tests pass; stale #152 card absent after refresh."
        - workflow: "06-web-app-restart"
          status: "gap"
          evidence: "Only HTTP health and refresh convergence were recorded; no live active-session restart proof."
        - workflow: "07-session-regression-matrix"
          status: "covered"
          evidence: "Full Workbench e2e passed with 28 passed, 1 skipped."

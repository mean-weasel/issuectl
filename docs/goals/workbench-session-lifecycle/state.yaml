        - cmd: "pnpm --filter @issuectl/web typecheck"
          status: pass
        - cmd: "pnpm --filter @issuectl/web exec playwright test e2e/workbench.spec.ts --project=desktop-chromium --grep \"supports top nav modes|captures workbench QA screenshots\""
          status: pass
        - cmd: "pnpm --filter @issuectl/web test:e2e -- e2e/workbench.spec.ts --project=desktop-chromium"
          status: pass
          output: "28 passed, 1 skipped"
      summary: "Drove the safe live #152 lifecycle through launch, return/reconnect, cancel End, confirm End, stale removal after refresh, and full mocked Workbench e2e. Also fixed a drawer-state regression found during full-suite verification: side-pane modes now restore drawers when selected from nav."
      workflow_results:

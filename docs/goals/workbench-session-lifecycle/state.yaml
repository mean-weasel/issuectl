    stop_if:
      - "A workflow requires destructive cleanup of a real user session."
      - "The local server cannot start."
      - "A live workflow failure indicates a new root cause not covered by existing tests."
    expected_output:
      - "Workflow receipts in state.yaml naming each workflow, result, screenshot/artifact path, and fixes made."
      - "Manual QA confirms launch, return, reconnect, end, stale reconciliation, and restart behavior."
    receipt:
      result: done
      changed_files:

version: 2

goal:
  title: "Workbench Session Lifecycle Hardening"
  slug: "workbench-session-lifecycle"
  kind: recovery
  tranche: "Create safe workflow artifacts, add rigorous Playwright/API coverage, fix root causes, and manually verify Workbench session lifecycle end to end."
  status: done
  intake:
    original_request: "Use goalbuddy goal-prep to plan rigorous Workbench session lifecycle workflows and tests."
    interpreted_outcome: "Workbench issue-backed terminal sessions can be created, reopened, reconnected, ended, and reconciled after stale or restarted states with automated and manual proof."
    input_shape: recovery
    audience: "Jeremy dogfooding Workbench"
    authority: requested
    proof_type: test
    completion_proof: "Markdown workflows, Playwright/API tests, manual QA receipts, and final audit prove launch/open/reconnect/end/stale/restart session flows behave deterministically."
    likely_misfire: "Passing mocked happy-path e2e tests while real session lifecycle and stale deployment states remain broken."
    blind_spots_considered:
      - "Deployment rows, tmux sessions, and ttyd processes can diverge."
      - "Refresh/restart can expose stale Workbench payload data."
      - "Cancel/end interactions may accidentally submit or navigate."
      - "Reconnect failures must reconcile UI state instead of leaving impossible cards."
      - "Tests must avoid destructive operations on non-test repos."
    existing_plan_facts:
      - "Create markdown workflows before implementation."
      - "Run workflows one at a time and pause to reflect/fix."
      - "Use Playwright CLI/headless where possible."
      - "Cover create, manage, return to, reconnect, stale cleanup, web restart, and close sessions."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/workbench-session-lifecycle/"
    command: "npx goalbuddy board docs/goals/workbench-session-lifecycle"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map current Workbench session lifecycle code paths and identify the exact boundaries that can produce stale session cards or failed reconnects."
    inputs:
      - "packages/web/components/workbench"
      - "packages/web/app/api"
      - "packages/web/e2e"
      - "packages/core or other deployment/session lifecycle modules discovered by Scout"
      - "User-reported symptom: #152 card says active, reconnect reports Deployment not found or already ended"
    constraints:
      - "Read-only."
      - "Do not edit product, test, or docs files."
      - "Do not end or mutate live sessions."
      - "Prefer concrete file paths, route names, DB fields, and process boundaries."
    expected_output:
      - "Lifecycle map from launch request to DB deployment row, tmux, ttyd, Workbench payload, session card, terminal iframe, reconnect, and end."
      - "List of existing tests and workflow gaps."
      - "Evidence-backed hypotheses for stale card and reconnect error."
      - "Recommended Worker allowed_files and verification commands for first implementation slice."
    receipt:
      result: done
      note: "notes/T001-lifecycle-map.md"
      summary: "Mapped launch, DB deployment, tmux/ttyd, Workbench payload, reconnect, terminal focus, and end-session boundaries. Found the likely #152 failure boundary: ensure-ttyd can return ended/not-found or end a deployment when tmux is gone, while the already-loaded Workbench React payload keeps rendering the stale session card."
      evidence:
        - "packages/core/src/launch/launch.ts"
        - "packages/core/src/db/deployments.ts"
        - "packages/core/src/launch/ttyd.ts"
        - "packages/web/lib/ensure-ttyd.ts"
        - "packages/web/lib/workbench-data.ts"
        - "packages/web/components/workbench/WorkbenchShell.tsx"
        - "packages/web/components/workbench/TerminalFocus.tsx"
        - "packages/web/components/workbench/InstancePane.tsx"
        - "packages/web/e2e/workbench.spec.ts"
        - "packages/web/e2e/terminal-respawn.spec.ts"
        - "packages/web/e2e/terminal-persistence.spec.ts"
      gaps:
        - "No Workbench stale ensure-ttyd error reconciliation test."
        - "No Workbench TerminalFocus failure reconciliation test."
        - "No end-cancel no-navigation/no-endpoint test."
        - "No markdown workflow suite for real Workbench session lifecycle QA."

  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Create safe markdown QA workflows for Workbench session lifecycle, with precise steps and pass/fail criteria for each flow."
    inputs:
      - "T001 receipt"
      - "docs/qa existing structure"
      - "User requirement to drive workflows one at a time with Playwright CLI/headless where possible"
    constraints:
      - "Write only QA workflow docs and an index."
      - "Workflows must avoid destructive actions on non-test repos."
      - "Each workflow must include setup, steps, expected UI/API/process observations, cleanup, and stop conditions."
    allowed_files:
      - "docs/qa/workbench-session-workflows/README.md"
      - "docs/qa/workbench-session-workflows/01-create-issue-session.md"
      - "docs/qa/workbench-session-workflows/02-return-to-active-session.md"
      - "docs/qa/workbench-session-workflows/03-reconnect-stopped-ttyd.md"
      - "docs/qa/workbench-session-workflows/04-end-session-cancel-confirm.md"
      - "docs/qa/workbench-session-workflows/05-stale-deployment-reconciliation.md"
      - "docs/qa/workbench-session-workflows/06-web-app-restart.md"
      - "docs/qa/workbench-session-workflows/07-session-regression-matrix.md"
    verify:
      - "test -f docs/qa/workbench-session-workflows/README.md"
      - "rg -n \"Acceptance criteria|Stop conditions|Playwright\" docs/qa/workbench-session-workflows"
    stop_if:
      - "Need to inspect or mutate live session state."
      - "A workflow requires credentials or destructive operations not already approved."
      - "A workflow cannot name measurable acceptance criteria."
    expected_output:
      - "Seven workflow markdown files plus README."
      - "Each workflow has quantifiable acceptance criteria."
      - "Receipt summarizes workflow coverage and any intentionally deferred flows."
    receipt:
      result: done
      changed_files:
        - "docs/qa/workbench-session-workflows/README.md"
        - "docs/qa/workbench-session-workflows/01-create-issue-session.md"
        - "docs/qa/workbench-session-workflows/02-return-to-active-session.md"
        - "docs/qa/workbench-session-workflows/03-reconnect-stopped-ttyd.md"
        - "docs/qa/workbench-session-workflows/04-end-session-cancel-confirm.md"
        - "docs/qa/workbench-session-workflows/05-stale-deployment-reconciliation.md"
        - "docs/qa/workbench-session-workflows/06-web-app-restart.md"
        - "docs/qa/workbench-session-workflows/07-session-regression-matrix.md"
      commands:
        - cmd: "test -f docs/qa/workbench-session-workflows/README.md && echo README_OK"
          status: pass
        - cmd: "rg -n \"Acceptance criteria|Stop conditions|Playwright\" docs/qa/workbench-session-workflows"
          status: pass
      summary: "Created seven safe Workbench session lifecycle workflow docs plus an index. Each workflow includes setup, Playwright/process checks, acceptance criteria, and stop conditions for launch, return, reconnect, end cancel/confirm, stale reconciliation, restart, and final regression mapping."

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Add automated Playwright coverage for the Workbench session UI state machine using safe mocked API routes."
    inputs:
      - "T001 receipt"
      - "T002 workflow docs"
      - "packages/web/e2e/workbench.spec.ts or a new workbench-sessions spec"
    constraints:
      - "Tests must assert visible UI state, route calls, and no unexpected page reload on cancel/end."
      - "Tests must include stale deployment and failed reconnect cases."
      - "Use mocked routes for destructive or hard-to-reproduce states."
    allowed_files:
      - "packages/web/e2e/workbench.spec.ts"
      - "packages/web/e2e/workbench-sessions.spec.ts"
      - "packages/web/e2e/fixtures/**"
    verify:
      - "pnpm --filter @issuectl/web exec playwright test e2e/workbench.spec.ts --project=desktop-chromium --grep \"session|reconnect|stale|end\""
      - "pnpm --filter @issuectl/web typecheck"
    stop_if:
      - "Needed app behavior is ambiguous and cannot be inferred from the workflow docs."
      - "Tests require live GitHub or real process mutation."
      - "The new tests cannot fail against the current bug shape."
    expected_output:
      - "Tests for launch-to-session-card-to-terminal."
      - "Tests for reopen after browser refresh."
      - "Tests for reconnect stopped ttyd while deployment remains active."
      - "Tests for cancel end without navigation and confirm end removes card."
      - "Tests for stale deployment or ended deployment error reconciliation."
    receipt:
      result: done
      changed_files:
        - "packages/web/e2e/workbench.spec.ts"
      commands:
        - cmd: "pnpm --filter @issuectl/web exec playwright test e2e/workbench.spec.ts --project=desktop-chromium --grep \"stale session|stale selected session|canceling end session|reconnects a session through\""
          status: fail_expected
          summary: "2 passed, 2 failed. Passing: reconnect happy path; cancel end is local-only. Failing as intended: stale reconnect and stale terminal-focus both leave session card visible."
        - cmd: "pnpm --filter @issuectl/web typecheck"
          status: pass
      summary: "Added Workbench e2e coverage for stale ensure-ttyd responses and cancel-end behavior. The stale tests reproduce the dogfood bug shape: the backend reports ended/not-found or terminal-session-ended, but the UI keeps an active-looking session card."
      failing_tests:
        - "removes a stale session when reconnect reports the deployment already ended"
        - "removes a stale selected session when terminal focus reports the session ended"

  - id: T004
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: high
    objective: "Fix Workbench frontend session state reconciliation based on failing tests and Scout evidence."
    inputs:
      - "T001 receipt"
      - "T003 failing tests"
      - "Current Workbench frontend state files"
    constraints:
      - "Fix root cause, not only error text."
      - "Session cards must not remain actionable when backend reports ended/not found."
      - "Cancel in an end confirmation must not reload the page."
      - "Session selection must keep left drawer visible, close right drawer, and render terminal in viewport."
    allowed_files:
      - "packages/web/components/workbench/WorkbenchShell.tsx"
      - "packages/web/components/workbench/InstancePane.tsx"
      - "packages/web/components/workbench/IssueQueuePane.tsx"
      - "packages/web/components/workbench/TerminalFocus.tsx"
      - "packages/web/components/workbench/workbench-state.ts"
      - "packages/web/components/workbench/workbench-api.ts"
      - "packages/web/components/workbench/WorkbenchShell.module.css"
      - "packages/web/e2e/workbench.spec.ts"
      - "packages/web/e2e/workbench-sessions.spec.ts"
    verify:
      - "pnpm --filter @issuectl/web typecheck"
      - "pnpm --filter @issuectl/web exec playwright test e2e/workbench.spec.ts --project=desktop-chromium --grep \"session|reconnect|stale|end\""
    stop_if:
      - "Backend/API contract changes are required."
      - "Fix requires files outside allowed_files."
      - "Verification fails twice with different root causes."
    expected_output:
      - "Frontend reconciles ended/not-found reconnect errors by removing or clearly demoting stale cards."
      - "End cancel is purely local and never submits or reloads."
      - "Session row errors are actionable and consistent."
      - "Receipt names changed files and passing commands."
    receipt:
      result: done
      changed_files:
        - "packages/web/components/workbench/workbench-api.ts"
        - "packages/web/components/workbench/TerminalFocus.tsx"
        - "packages/web/components/workbench/WorkbenchShell.tsx"
        - "packages/web/e2e/workbench.spec.ts"
      commands:
        - cmd: "pnpm --filter @issuectl/web typecheck"
          status: pass
        - cmd: "pnpm --filter @issuectl/web exec playwright test e2e/workbench.spec.ts --project=desktop-chromium --grep \"stale session|stale selected session|canceling end session|reconnects a session through\""
          status: pass
      summary: "Added frontend stale-deployment detection for ensure-ttyd results. Reconnect and terminal-focus paths now remove ended/not-found or terminal-session-ended deployments from Workbench state, clearing the selected terminal and updating running issue state. Cancel-end remains local-only."

  - id: T005
    type: worker
    assignee: Worker
    status: blocked
    reasoning_hint: high
    objective: "Fix backend/API deployment lifecycle contracts if frontend-only reconciliation is insufficient."
    inputs:
      - "T001 receipt"
      - "T003/T004 test failures or stop receipt"
      - "Deployment lifecycle API modules discovered by Scout"
    constraints:
      - "Only activate this task if T004 proves backend/API contract changes are needed."
      - "Prefer typed JSON responses over string matching."
      - "Ensure Workbench payload and ensure-ttyd/end routes agree about active versus ended deployments."
      - "Do not alter unrelated launch semantics."
    allowed_files:
      - "packages/web/app/api/v1/deployments/**"
      - "packages/web/app/api/v1/launch/**"
      - "packages/web/app/api/v1/workbench/**"
      - "packages/core/**"
      - "packages/web/e2e/workbench.spec.ts"
      - "packages/web/e2e/workbench-sessions.spec.ts"
      - "packages/web/**/*.test.ts"
    verify:
      - "pnpm --filter @issuectl/web typecheck"
      - "pnpm --filter @issuectl/web exec playwright test e2e/workbench.spec.ts --project=desktop-chromium --grep \"session|reconnect|stale|end\""
      - "pnpm test --filter @issuectl/core"
    stop_if:
      - "Database migration is required."
      - "Need destructive cleanup of live deployments without explicit approval."
      - "The correct active/ended policy is ambiguous."
    expected_output:
      - "API returns deterministic typed status for not_found, ended, missing_ttyd, missing_tmux, and active where supported."
      - "Workbench payload does not advertise ended deployments as active sessions, or marks them explicitly stale."
      - "Tests prove the contract."
    receipt:
      result: blocked
      reason: "not_needed_for_current_slice"
      summary: "Frontend reconciliation was sufficient for the currently reproduced stale-card bug shape. Existing ensure-ttyd responses already distinguish active success from ended/not-found and terminal-session-ended errors. Backend typed-status improvements remain optional follow-up, not required for this tranche unless manual QA exposes ambiguity."

  - id: T006
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Drive each markdown workflow with Playwright CLI/headless against the local app and record QA receipts."

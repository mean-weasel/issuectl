<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>issuectl — Offline</title>
  <style>
    :root {
      --paper-bg: #f3ecd9;
      --paper-ink: #1a1712;
      --paper-ink-soft: #3a342a;
      --paper-ink-muted: #746a50;
      --paper-accent: #2d5f3f;
      --paper-line: #e0d6bc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--paper-bg);
      color: var(--paper-ink);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
      padding: 48px 32px;
      border: 1px solid var(--paper-line);
      border-radius: 14px;
      background: var(--paper-bg);
    }

    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      border-radius: 50%;
      border: 2px solid var(--paper-line);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 28px;
      height: 28px;
    }

    h1 {
      font-family: Georgia, serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--paper-ink);
      margin-bottom: 12px;
    }

    p {
      font-size: 14px;
      color: var(--paper-ink-soft);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .hint {
      font-size: 12px;
      color: var(--paper-ink-muted);
      margin-top: 16px;
    }

    .retry {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 24px;
      background: var(--paper-accent);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
    }

    .retry:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="1" y1="1" x2="23" y2="23" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>issuectl can't reach the server right now.</p>
    <p>Pages you've visited before are available from cache — use the back button to return to one.</p>
    <p class="hint">Check your network connection or Tailscale status.</p>
    <a href="/" class="retry">Try again</a>
  </div>
</body>
</html>

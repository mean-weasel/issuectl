name: iOS Physical Preview

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref or SHA to test. Defaults to the dispatch ref.'
        required: false
        type: string
      smoke_profile:
        description: 'Physical iPhone preview smoke profile to run'
        required: true
        default: pr
        type: choice
        options:
          - fast
          - pr
          - full

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  physical-preview:
    name: Physical iPhone Preview Smoke
    runs-on: ${{ fromJSON(github.event_name != 'workflow_dispatch' && '["ubuntu-latest"]' || '["self-hosted","macOS","issuectl-ios","iphone-preview"]') }}
    timeout-minutes: 25
    env:
      IOS_DEVICE_NAME: iPhone-preview
      IOS_SCHEME: IssueCTLPreview-UISmoke
      IOS_CONFIGURATION: Debug
      IOS_DEVICE_READY_TIMEOUT: 60
      IOS_XCODEBUILD_EXTRA_ARGS: -allowProvisioningUpdates -allowProvisioningDeviceRegistration
      IOS_PREVIEW_KEYCHAIN_PASSWORD: ${{ secrets.IOS_PREVIEW_KEYCHAIN_PASSWORD }}
      IOS_PREVIEW_SET_KEY_PARTITION_LIST: '1'
      SHOULD_RUN_PHYSICAL_PREVIEW: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
    steps:
      - name: Queue placeholder
        if: env.SHOULD_RUN_PHYSICAL_PREVIEW != '1'
        run: echo "Physical iPhone preview smoke runs only via workflow_dispatch."

      - uses: actions/checkout@v6
        if: env.SHOULD_RUN_PHYSICAL_PREVIEW == '1'
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: Preflight runner, signing, and iPhone-preview
        if: env.SHOULD_RUN_PHYSICAL_PREVIEW == '1'
        run: ./scripts/ios-preview-runner-preflight.sh

      - name: Show build environment
        if: env.SHOULD_RUN_PHYSICAL_PREVIEW == '1'
        run: swift --version

      - name: Resolve iPhone-preview
        if: env.SHOULD_RUN_PHYSICAL_PREVIEW == '1'
        run: ./scripts/ios-resolve-preview-device.sh

      - name: List iOS devices
        if: env.SHOULD_RUN_PHYSICAL_PREVIEW == '1'
        run: ./scripts/ios-list-devices.sh

      - name: Run physical preview smoke
        if: env.SHOULD_RUN_PHYSICAL_PREVIEW == '1'
        env:
          IOS_UI_SMOKE_PROFILE: ${{ inputs.smoke_profile || 'pr' }}
        run: ./scripts/ios-preview-device-smoke.sh

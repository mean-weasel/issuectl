name: CI

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for CI-relevant changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            base_ref="origin/${{ github.base_ref }}"
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed="$(git diff --name-only "$base_ref"...HEAD)"
          elif [ "$GITHUB_EVENT_NAME" = "merge_group" ]; then
            if git rev-parse --verify HEAD^1 >/dev/null 2>&1; then
              changed="$(git diff --name-only HEAD^1 HEAD)"
            else
              changed="$(git diff-tree --no-commit-id --name-only -r HEAD)"
            fi
          else
            changed="$(git diff-tree --no-commit-id --name-only -r HEAD)"
          fi

          echo "Changed files:"
          printf '%s\n' "$changed"

          # CI is relevant when at least one changed file is NOT in the
          # iOS-only / docs-only / husky-only ignore set.
          # Single regex: match files we'd ignore. If any file does NOT
          # match, CI has work to do.
          ignore_re='^(ios/|docs/|\.husky/|\.github/workflows/ios\.yml$|\.github/.*\.md$|LICENSE$|.*\.(md|html|txt)$)'

          if printf '%s\n' "$changed" | grep -qvE "$ignore_re"; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [changes, typecheck, lint, test]
    if: needs.changes.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build

  e2e-web:
    name: E2E Web (mobile UX + launch UI)
    runs-on: ubuntu-latest
    needs: [changes, typecheck, lint, test]
    if: needs.changes.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build core package
        # next dev resolves @issuectl/core via its package.json exports
        # (dist/index.js), so the workspace package must be built before
        # the web dev server can boot. Other jobs use TS path resolution
        # and don't need this.
        run: pnpm turbo build --filter=@issuectl/core
      - name: Verify gh CLI auth
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # GH_TOKEN env var satisfies both `gh auth status` here and the
        # canRun() probe inside both specs (which call `gh auth token`).
        # Specs hard-fail in CI if canRun() returns false, so a
        # misconfigured token causes a loud failure, not a silent skip.
        run: gh auth status
      - name: Install Playwright chromium
        run: pnpm --filter @issuectl/web exec playwright install --with-deps chromium
      - name: Run mobile UX regression spec
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Specs run in separate invocations because two `next dev`
        # processes against the same packages/web/.next/cache/webpack/
        # collide on pack file rename, even sequentially. Each
        # `playwright test` invocation gets a clean process boundary.
        run: pnpm --filter @issuectl/web exec playwright test mobile-ux-patterns.spec.ts --project=mobile-chromium
      - name: Run launch UI spec
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter @issuectl/web exec playwright test launch-ui.spec.ts --project=mobile-chromium
      - name: Run viewport health spec
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter @issuectl/web exec playwright test viewport-health.spec.ts --project=mobile-chromium
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-e2e-web
          path: packages/web/playwright-report/
          retention-days: 7

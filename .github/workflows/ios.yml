name: iOS

on:
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - 'scripts/ios-ui-smoke.sh'
      - 'package.json'
      - '.husky/pre-push'
      - '.github/workflows/ios.yml'
  merge_group:
    branches: [main]
  workflow_dispatch:
    inputs:
      smoke_profile:
        description: 'iOS UI smoke profile to run'
        required: true
        default: full
        type: choice
        options:
          - fast
          - pr
          - full

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + UI Smoke
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode with iOS Simulator runtime
        run: |
          for developer_dir in \
            /Applications/Xcode_16.4.app/Contents/Developer \
            /Applications/Xcode_16.3.app/Contents/Developer \
            /Applications/Xcode.app/Contents/Developer
          do
            if [ ! -d "$developer_dir" ]; then
              continue
            fi

            sudo xcode-select -s "$developer_dir"
            if xcrun simctl list runtimes available | grep -q 'iOS'; then
              echo "Selected $developer_dir"
              exit 0
            fi
          done

          echo "No Xcode installation with an available iOS Simulator runtime found" >&2
          exit 70

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project ios/IssueCTL.xcodeproj \
            -scheme IssueCTL \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Run UI smoke workflow suite
        run: |
          profile="full"
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            profile="pr"
          fi
          if [ -n "${{ inputs.smoke_profile }}" ]; then
            profile="${{ inputs.smoke_profile }}"
          fi

          IOS_UI_SMOKE_PROFILE="$profile" ./scripts/ios-ui-smoke.sh

name: Mac Runner Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mac-mini-1:
    name: mac-mini-1
    runs-on: [self-hosted, macOS, ARM64, trusted-macos-e2e, mac-mini-1]
    timeout-minutes: 10
    steps:
      - name: Cleanup before
        run: /usr/local/ci/bin/macos-runner-cleanup --json
      - name: Host proof
        run: |
          hostname
          sw_vers
          uname -m
      - name: Healthcheck after
        if: always()
        run: /usr/local/ci/bin/macos-runner-healthcheck --json

  mac-mini-2:
    name: mac-mini-2
    runs-on: [self-hosted, macOS, ARM64, trusted-macos-e2e, mac-mini-2]
